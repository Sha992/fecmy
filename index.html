                    background:'var(--leaf-100)',color:'var(--leaf-500)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Icon n="phone" size={15} />
                  </a>
                )}
                <button onClick={e=>{e.stopPropagation();setEditId(s.id);setShowForm(true);}} style={{width:34,height:34,
                  borderRadius:'50%',border:'none',background:'var(--navy-50)',color:'var(--navy-700)',
                  cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Icon n="pencil" size={14} />
                </button>
              </div>
            </div>
          );
        })}
        <div style={{height:8}} />
      </div>

      <StudentForm open={showForm} student={editing} classes={classes}
        defaultClassId={classFilter!=='all'?classFilter:(classes[0]&&classes[0].id)}
        onSave={data=>{ editId?onEdit({...data,id:editId}):onAdd(data); setShowForm(false); setEditId(null); }}
        onDelete={editId?()=>{onDelete(editId);setShowForm(false);setEditId(null);}:null}
        onClose={()=>{setShowForm(false);setEditId(null);}} />

      <StudentSheet open={!!viewing} student={viewing} cls={viewing&&clsOf(viewing.classId)}
        attendance={attendance} onClose={()=>setViewId(null)}
        onEdit={()=>{ setEditId(viewId); setViewId(null); setShowForm(true); }} />
    </div>
  );
}

function StudentForm({ open, student, classes=[], defaultClassId, onSave, onDelete, onClose }) {
  const blank={name:'',classId:defaultClassId||'',age:'',parentName:'',parentPhone:'',notes:'',birthday:'',visitor:false};
  const [f,setF]=useState(blank);
  const [err,setErr]=useState({});
  const [confirm,setConfirm]=useState(false);

  useEffect(()=>{
    if(open){
      setF(student?{name:student.name,classId:student.classId||defaultClassId||'',age:student.age||'',parentName:student.parentName||'',
        parentPhone:student.parentPhone||'',notes:student.notes||'',birthday:student.birthday||'',visitor:!!student.visitor}:blank);
      setErr({}); setConfirm(false);
    }
  },[open,student]);

  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const valid=()=>{
    const e={};
    if(!f.name.trim()) e.name='Name is required';
    if(f.birthday&&!/^(\d{4}-)?\d{2}-\d{2}$/.test(f.birthday.trim())) e.birthday='Use MM-DD or YYYY-MM-DD';
    return e;
  };
  const go=()=>{
    const e=valid(); if(Object.keys(e).length){setErr(e);return;}
    onSave({...(student||{}),name:f.name.trim(),classId:f.classId,age:f.age?Number(f.age):'',
      parentName:f.parentName.trim(),parentPhone:f.parentPhone.trim(),notes:f.notes.trim(),
      birthday:f.birthday.trim(),visitor:f.visitor});
  };

  return (
    <Modal open={open} onClose={onClose} title={student?'Edit student':'Add student'}
      footer={<>
        {student&&!confirm&&<Btn variant="ghost" size="sm" style={{color:'var(--danger-500)',marginRight:'auto'}} onClick={()=>setConfirm(true)}>
          <Icon n="trash-2" size={15} style={{marginRight:4}} />Delete</Btn>}
        {confirm&&<div style={{display:'flex',gap:8,marginRight:'auto',alignItems:'center'}}>
          <span style={{fontSize:'var(--text-sm)',color:'var(--danger-500)',fontWeight:600}}>Remove student?</span>
          <Btn variant="danger" size="sm" onClick={onDelete}>Remove</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>setConfirm(false)}>Cancel</Btn>
        </div>}
        <Btn variant="ghost" size="sm" onClick={onClose}>Cancel</Btn>
        <Btn variant="primary" size="sm" onClick={go}>Save</Btn>
      </>}>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <Input label="Full name" placeholder="e.g. ሃሌሉያ ዳዊት" value={f.name} onChange={set('name')} required error={err.name} />
        {classes.length>0 && (
          <div>
            <label style={{display:'block',fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)',marginBottom:6}}>Class</label>
            <select value={f.classId} onChange={set('classId')} style={{width:'100%',padding:'10px 14px',
              borderRadius:'var(--radius-md)',border:'1.5px solid var(--border-default)',background:'var(--paper)',
              fontFamily:'var(--font-sans)',fontSize:'var(--text-md)',color:'var(--text-strong)',outline:'none'}}>
              {classes.map(c=><option key={c.id} value={c.id}>{className(c)}</option>)}
            </select>
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'var(--space-3)'}}>
          <Input label="Age" type="number" placeholder="e.g. 12" value={f.age} onChange={set('age')} />
          <Input label="Birthday" placeholder="MM-DD or YYYY-MM-DD" value={f.birthday} onChange={set('birthday')} error={err.birthday} hint="e.g. 03-21" />
        </div>
        <Input label="Parent / guardian name" placeholder="e.g. ዳዊት ሃሌሉያ" value={f.parentName} onChange={set('parentName')} />
        <Input label="Parent phone" type="tel" placeholder="+251 91 234 5678" value={f.parentPhone} onChange={set('parentPhone')} hint="For absence alerts. Include country code (+251…)" />
        <Input label="Notes" placeholder="Any important notes…" value={f.notes} onChange={set('notes')} multi rows={3} />
        <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',padding:'10px 12px',
          background:f.visitor?'var(--grape-100)':'var(--surface-sunken)',borderRadius:'var(--radius-md)'}}>
          <input type="checkbox" checked={f.visitor} onChange={e=>setF(p=>({...p,visitor:e.target.checked}))}
            style={{width:17,height:17,accentColor:'var(--grape-500)'}} />
          <span style={{fontSize:'var(--text-sm)',fontWeight:600,color:f.visitor?'#5C4480':'var(--text-body)'}}>
            First-time visitor
          </span>
          <span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto'}}>Untick to make a regular student</span>
        </label>
      </div>
    </Modal>
  );
}

// Tap-a-student profile: attendance history dots, rate, streak, parent contact.
function StudentSheet({ open, student, cls, attendance, onClose, onEdit }) {
  if(!student) return null;
  const rate=attendanceRate(student.id,attendance);
  const streak=absenceStreak(student.id,attendance);
  const pstreak=presenceStreak(student.id,attendance);
  const hist=studentHistory(student.id,attendance,10);
  const presentCount=hist.filter(h=>h.mark==='p').length;
  const absentCount=hist.filter(h=>h.mark==='a').length;
  const dotColor={p:'var(--leaf-500)',a:'var(--coral-500)',u:'var(--ink-200)'};
  const waDigits=(student.parentPhone||'').replace(/[^\d]/g,'');
  const waText=encodeURIComponent(`Hello${student.parentName?' '+student.parentName:''}, this is from FECMY Children Ministry regarding ${student.name}.`);

  return (
    <Modal open={open} onClose={onClose} title="Student profile"
      footer={<>
        <Btn variant="ghost" size="sm" onClick={onClose}>Close</Btn>
        <Btn variant="primary" size="sm" iL={<Icon n="pencil" size={14} />} onClick={onEdit}>Edit</Btn>
      </>}>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-5)'}}>
        {/* Identity */}
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <Av name={student.name} size="lg" />
          <div style={{minWidth:0}}>
            <div style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-strong)',letterSpacing:'-.01em'}}>{student.name}</div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:5,flexWrap:'wrap'}}>
              {cls && <Badge tone={cls.tone}>{className(cls)}</Badge>}
              {student.age && <Badge tone="neutral">Age {student.age}</Badge>}
              {student.visitor && <Badge tone="grape"><Icon n="sparkles" size={11} style={{marginRight:3}} />Visitor</Badge>}
              {student.birthday && nextBirthdayInfo(student.birthday) && (
                <Badge tone="coral"><Icon n="cake" size={11} style={{marginRight:3}} />
                  {(()=>{const b=nextBirthdayInfo(student.birthday);
                    return b.days===0?'Birthday today!':fmtShort(dk(b.date))+(b.turning?` · ${b.turning}`:'');})()}
                </Badge>
              )}
              {pstreak>=3 && <Badge tone="warning"><Icon n="flame" size={11} style={{marginRight:3}} />{pstreak}× present in a row</Badge>}
              {streak>=3 && <Badge tone="coral">Absent {streak}× in a row</Badge>}
            </div>
          </div>
        </div>

        {/* Attendance ring + sparkline + mini stats */}
        <div style={{display:'flex',gap:'var(--space-4)',alignItems:'stretch',flexWrap:'wrap'}}>
          <div style={{background:'var(--surface-sunken)',borderRadius:'var(--radius-lg)',padding:'var(--space-4)',
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,flexShrink:0}}>
            <RadialGauge value={rate} goal={85} size={116} />
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',color:'var(--text-muted)'}}>Attendance</div>
          </div>
          <div style={{flex:1,minWidth:160,display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
            <div style={{background:'var(--surface-sunken)',borderRadius:'var(--radius-lg)',padding:'12px 14px'}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:'.04em',textTransform:'uppercase',marginBottom:6}}>Recent trend</div>
              <Sparkline hist={hist} w={220} h={44} />
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'var(--space-2)'}}>
              {[[presentCount,'Present','var(--leaf-500)','check'],[absentCount,'Absent','var(--coral-500)','x'],
                [pstreak,'Streak','var(--warning-500)','flame']].map(([v,l,col,ic])=>(
                <div key={l} style={{background:'var(--surface-sunken)',borderRadius:'var(--radius-md)',padding:'10px 6px',textAlign:'center'}}>
                  <div style={{fontSize:'var(--text-lg)',fontWeight:800,lineHeight:1,color:col,
                    display:'inline-flex',alignItems:'center',gap:3}}>
                    {l==='Streak'&&<Icon n={ic} size={13} color={col} />}{v}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* History dots */}
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:'.05em',
            textTransform:'uppercase',marginBottom:10}}>Last 10 Sundays</div>
          <div style={{display:'flex',gap:6,justifyContent:'space-between'}}>
            {hist.map((h,i)=>(
              <div key={h.date} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,flex:1}}>
                <span style={{width:'100%',maxWidth:24,aspectRatio:'1',borderRadius:'50%',background:dotColor[h.mark],
                  display:'inline-flex',alignItems:'center',justifyContent:'center',
                  animation:`popIn 300ms ${i*40}ms cubic-bezier(0.34,1.56,0.64,1) both`}}>
                  {h.mark==='p'&&<Icon n="check" size={11} color="#fff" />}
                  {h.mark==='a'&&<Icon n="x" size={10} color="#fff" />}
                </span>
                <span style={{fontSize:9,color:'var(--text-subtle)',fontWeight:600,whiteSpace:'nowrap'}}>{fmtShort(h.date).replace(' ',' ')}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Parent contact */}
        <div style={{background:'var(--surface-sunken)',borderRadius:'var(--radius-lg)',padding:'var(--space-4)'}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:'.05em',
            textTransform:'uppercase',marginBottom:8}}>Parent / guardian</div>
          {student.parentName||student.parentPhone ? (
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,color:'var(--text-strong)'}}>{student.parentName||'—'}</div>
                {student.parentPhone&&<div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)',marginTop:2}}>{student.parentPhone}</div>}
              </div>
              {student.parentPhone&&(
                <div style={{display:'flex',gap:8,flexShrink:0}}>
                  <a href={`https://wa.me/${waDigits}?text=${waText}`} target="_blank" rel="noopener"
                    aria-label="WhatsApp" title="WhatsApp" style={{textDecoration:'none',display:'inline-flex',
                    alignItems:'center',justifyContent:'center',gap:7,background:'#25D366',color:'#fff',fontWeight:700,
                    fontSize:'var(--text-sm)',padding:'10px 16px',borderRadius:'var(--radius-pill)',boxShadow:'var(--shadow-sm)'}}>
                    <Icon n="message-circle" size={15} /> WhatsApp
                  </a>
                  <a href={`tel:${student.parentPhone}`} aria-label="Call" title="Call" style={{textDecoration:'none',display:'inline-flex',
                    alignItems:'center',justifyContent:'center',gap:7,background:'var(--leaf-500)',color:'#fff',fontWeight:700,
                    fontSize:'var(--text-sm)',padding:'10px 16px',borderRadius:'var(--radius-pill)',boxShadow:'var(--shadow-sm)'}}>
                    <Icon n="phone" size={15} /> Call
                  </a>
                </div>
              )}
            </div>
          ) : (
            <div style={{fontSize:'var(--text-sm)',color:'var(--text-subtle)',fontStyle:'italic'}}>
              No parent info yet — tap Edit to add a phone number for absence follow-ups.
            </div>
          )}
        </div>

        {student.notes && (
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:'.05em',
              textTransform:'uppercase',marginBottom:6}}>Notes</div>
            <div style={{fontSize:'var(--text-sm)',color:'var(--text-body)',lineHeight:1.6}}>{student.notes}</div>
          </div>
        )}
      </div>
    </Modal>
  );
}

/* ── ATTENDANCE ── */
function Attendance({ students, classes, attendance, activeClassId, setActiveClassId, onSave, notify, onAddVisitor, t=s=>s }) {
  const isDesk=useMedia('(min-width:1024px)');
  const [showVisitor,setShowVisitor]=useState(false);
  const [visName,setVisName]=useState('');
  const [visPhone,setVisPhone]=useState('');
  const sundays=recentSundays(14);
  const [selDate,setSelDate]=useState(dk(sundays[0]));
  const [marks,setMarks]=useState({});
  const [saved,setSaved]=useState(false);
  const [showPicker,setShowPicker]=useState(false);

  const cls = classes.find(c=>c.id===activeClassId) || classes[0];
  const classStudents = students.filter(s=>s.classId===(cls&&cls.id)).sort(byName);

  useEffect(()=>{
    const ex=attendance[selDate]||{};
    setMarks(Object.fromEntries(classStudents.map(s=>[s.id,ex[s.id]??null])));
    setSaved(classStudents.length>0 && classStudents.every(s=>s.id in ex));
  // NB: intentionally NOT depending on students — adding a visitor mid-session
  // must not rebuild marks from saved data and wipe unsaved ticks.
  },[selDate,activeClassId]);

  const toggle=id=>{
    setSaved(false);
    setMarks(m=>({...m,[id]:m[id]===true?false:true}));
  };
  const markAll=v=>{ setSaved(false); setMarks(Object.fromEntries(classStudents.map(s=>[s.id,v]))); };
  const present=classStudents.filter(s=>marks[s.id]===true).length;
  const absent=classStudents.filter(s=>marks[s.id]===false).length;

  const doSave=()=>{
    // save only this class's explicitly-marked students (merged with other classes in App)
    const toSave=Object.fromEntries(classStudents.map(s=>[s.id,marks[s.id]]).filter(([,v])=>v!==null&&v!==undefined));
    onSave(selDate,toSave);
    setSaved(true);
    const total=classStudents.length;
    if(total>0 && present===total){
      fireConfetti();
      notify&&notify(`Everyone is here! ${present}/${total} present 🎉`);
    } else {
      notify&&notify(`Saved — ${present}/${total} present`);
    }
  };

  return (
    <div className="page" style={{maxWidth:isDesk?1100:680,margin:'0 auto',padding:isDesk?'8px 36px 32px':undefined}}>
      <div style={{padding:'var(--space-5) var(--space-4) 0'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'var(--space-4)'}}>
          <div>
            <h1 style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-strong)',letterSpacing:'-.02em'}}>{t('Attendance')}</h1>
            <button onClick={()=>setShowPicker(p=>!p)} style={{display:'flex',alignItems:'center',gap:5,
              background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font-sans)',
              fontSize:'var(--text-sm)',color:'var(--link)',fontWeight:600,padding:'3px 0'}}>
              <Icon n="calendar" size={14} />{fmtShort(selDate)}<Icon n="chevron-down" size={13} />
            </button>
          </div>
          <Btn variant={saved?'leaf':'primary'} size="sm"
            iL={<Icon n={saved?'check':'save'} size={15} />} onClick={doSave}>
            {t(saved?'Saved':'Save')}
          </Btn>
        </div>

        {/* Class selector */}
        {classes.length>1 && (
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:'var(--space-4)'}}>
            {classes.map(c=>{
              const on=c.id===(cls&&cls.id);
              return (
                <button key={c.id} onClick={()=>setActiveClassId(c.id)} style={{
                  display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'8px 14px',
                  borderRadius:'var(--radius-pill)',fontFamily:'var(--font-sans)',
                  border:on?'1.5px solid var(--navy-800)':'1px solid var(--border-default)',
                  background:on?'var(--navy-800)':'var(--surface-card)',
                  color:on?'var(--cream-50)':'var(--text-muted)',fontWeight:on?700:500,fontSize:'var(--text-sm)'}}>
                  <span style={{width:9,height:9,borderRadius:'50%',background:`var(--${c.tone}-500)`,flexShrink:0}} />
                  {className(c)}
                </button>
              );
            })}
          </div>
        )}

        {/* Date picker */}
        {showPicker && (
          <div style={{background:'var(--paper)',border:'1px solid var(--border-soft)',
            borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-md)',marginBottom:'var(--space-4)',overflow:'hidden',maxHeight:280,overflowY:'auto'}}>
            {sundays.map(s=>{
              const k=dk(s); const r=attendance[k];
              const has=r&&Object.keys(r).length>0;
              return (
                <button key={k} onClick={()=>{setSelDate(k);setShowPicker(false);}} style={{
                  width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',
                  padding:'12px 16px',background:k===selDate?'var(--navy-50)':'transparent',
                  border:'none',borderBottom:'1px solid var(--border-soft)',cursor:'pointer',
                  fontFamily:'var(--font-sans)',textAlign:'left'}}>
                  <span style={{fontWeight:k===selDate?700:500,color:k===selDate?'var(--navy-800)':'var(--text-body)',fontSize:'var(--text-sm)'}}>
                    {fmtFull(k)}
                  </span>
                  {has?<Badge tone="leaf" size="sm">{Object.values(r).filter(Boolean).length}/{Object.keys(r).length}</Badge>
                      :<span style={{fontSize:11,color:'var(--text-subtle)'}}>No data</span>}
                </button>
              );
            })}
          </div>
        )}

        {/* Progress card */}
        <div style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
          borderRadius:'var(--radius-lg)',padding:'var(--space-4)',marginBottom:'var(--space-4)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{display:'flex',gap:16}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:'var(--text-2xl)',fontWeight:800,color:'var(--leaf-500)',lineHeight:1}}>{present}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{t('Present')}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:'var(--text-2xl)',fontWeight:800,color:'var(--coral-500)',lineHeight:1}}>{absent}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{t('Absent')}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:'var(--text-2xl)',fontWeight:800,color:'var(--text-subtle)',lineHeight:1}}>{classStudents.length-present-absent}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{t('Unmarked')}</div>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:'var(--text-3xl)',fontWeight:800,color:'var(--text-brand)',lineHeight:1}}>
                {classStudents.length?Math.round(present/classStudents.length*100):0}%
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{t('Attendance rate')}</div>
            </div>
          </div>
          <div style={{height:8,borderRadius:'var(--radius-pill)',background:'var(--surface-sunken)',overflow:'hidden'}}>
            <div style={{width:(classStudents.length?present/classStudents.length*100:0)+'%',height:'100%',
              background:'var(--leaf-500)',borderRadius:'var(--radius-pill)',transition:'width 300ms ease'}} />
          </div>
          <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
            <Btn variant="ghost" size="sm" iL={<Icon n="check-check" size={14} />} onClick={()=>markAll(true)}>{t('All present')}</Btn>
            <Btn variant="ghost" size="sm" iL={<Icon n="x" size={14} />} onClick={()=>markAll(false)}>{t('All absent')}</Btn>
            <Btn variant="ghost" size="sm" iL={<Icon n="sparkles" size={14} />} style={{color:'var(--grape-500)'}}
              onClick={()=>setShowVisitor(v=>!v)}>{t('Add visitor')}</Btn>
          </div>

          {/* First-time visitor quick add — joins this class & is marked present for the selected Sunday */}
          {showVisitor && (
            <div style={{marginTop:12,padding:'var(--space-4)',background:'var(--grape-100)',
              borderRadius:'var(--radius-md)',animation:'fadeUp 200ms ease'}}>
              <div style={{fontSize:'var(--text-sm)',fontWeight:700,color:'#5C4480',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
                <Icon n="sparkles" size={14} /> {t('Add visitor')} — {fmtShort(selDate)}
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <input value={visName} onChange={e=>setVisName(e.target.value)} placeholder="Child's name"
                  style={{flex:'2 1 160px',padding:'9px 12px',borderRadius:'var(--radius-md)',border:'1.5px solid var(--border-default)',
                    background:'var(--paper)',fontFamily:'var(--font-sans)',fontSize:'var(--text-sm)',outline:'none'}} />
                <input value={visPhone} onChange={e=>setVisPhone(e.target.value)} placeholder="Parent phone (optional)" type="tel"
                  style={{flex:'1 1 130px',padding:'9px 12px',borderRadius:'var(--radius-md)',border:'1.5px solid var(--border-default)',
                    background:'var(--paper)',fontFamily:'var(--font-sans)',fontSize:'var(--text-sm)',outline:'none'}} />
                <Btn variant="primary" size="sm" disabled={!visName.trim()} onClick={()=>{
                  const id=onAddVisitor(visName.trim(),visPhone.trim(),cls.id,selDate);
                  if(id){ setMarks(m=>({...m,[id]:true})); setSaved(false); }  // mark present locally; keep existing ticks
                  setVisName(''); setVisPhone(''); setShowVisitor(false);
                }}>{t('Add')}</Btn>

/* ── SESSIONS ── */
/* Renders plain text the way it was typed: line breaks kept, plus light
   formatting — "# Heading", "- bullet", "1. numbered", "**bold**", and
   short "Label:" lines become subheads. Planning notes, not a word processor. */
/* ── Rich text helpers + editor ── */
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineMd(s){ return escHtml(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); }
// Light sanitiser for stored HTML (content is from signed-in teachers, but be safe).
function sanitizeHtml(html){
  if(!html) return '';
  return String(html)
    .replace(/<\s*(script|style|iframe|object|embed|link|meta)[^>]*>[\s\S]*?<\s*\/\s*\1\s*>/gi,'')
    .replace(/<\s*(script|style|iframe|object|embed|link|meta)[^>]*\/?>/gi,'')
    .replace(/\son\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi,'')
    .replace(/(href|src)\s*=\s*(["'])\s*javascript:[^"']*\2/gi,'$1="#"');
}
// Convert legacy plain-text notes to editable HTML (bullets, kept numbers, headings).
function plainToHtml(text){
  if(!text) return '';
  const lines=String(text).split('\n'); const out=[]; let inList=false;
  const close=()=>{ if(inList){ out.push('</ul>'); inList=false; } };
  for(const raw of lines){
    const line=raw.trim();
    const mBul=line.match(/^[-•*]\s+(.*)/);
    const mHead=line.match(/^#{1,3}\s+(.*)/);
    const mNum=/^\d+[.)]\s+/.test(line);
    if(mBul){ if(!inList){ out.push('<ul>'); inList=true; } out.push('<li>'+inlineMd(mBul[1])+'</li>'); continue; }
    close();
    if(!line) continue;
    if(mHead){ out.push('<h3>'+inlineMd(mHead[1])+'</h3>'); continue; }
    if(mNum){ out.push('<p><strong>'+inlineMd(line)+'</strong></p>'); continue; }
    if(/^[^.!?]{2,48}:$/.test(line)){ out.push('<h3>'+escHtml(line)+'</h3>'); continue; }
    out.push('<p>'+inlineMd(line)+'</p>');
  }
  close();
  return out.join('');
}

function RichEditor({ html, onChange, placeholder='', templates }) {
  const ref=useRef(null);
  const [styleOpen,setStyleOpen]=useState(false);
  const checkEmpty=()=>{ const el=ref.current; if(!el) return;
    el.classList.toggle('is-empty',(el.textContent||'').trim()==='' && !el.querySelector('img,li,hr')); };
  useEffect(()=>{ if(ref.current){ ref.current.innerHTML=html||''; checkEmpty(); } },[]); // init once (keyed remount per session)
  const emit=()=>{ const el=ref.current; if(!el) return; checkEmpty(); onChange(el.innerHTML, el.innerText); };
  const cmd=(c,v)=>{ ref.current&&ref.current.focus(); try{document.execCommand(c,false,v);}catch{} emit(); };
  const setBlock=tag=>{ ref.current&&ref.current.focus(); try{document.execCommand('formatBlock',false,tag);}catch{} setStyleOpen(false); emit(); };
  const addLink=()=>{ const url=prompt('Link address (https://…)'); if(url) cmd('createLink',/^https?:\/\//i.test(url)?url:'https://'+url); };
  const insertTpl=body=>{ ref.current&&ref.current.focus(); try{document.execCommand('insertHTML',false,plainToHtml(body));}catch{} emit(); };
  const Tb=({c,v,icon,label})=> <button type="button" className="rte-btn" title={label} aria-label={label}
    onMouseDown={e=>e.preventDefault()} onClick={()=>cmd(c,v)}>{icon}</button>;
  return (
    <div className="rte">
      <div className="rte-toolbar">
        <div className="rte-style">
          <button type="button" className="rte-btn" style={{fontWeight:700}} onMouseDown={e=>e.preventDefault()} onClick={()=>setStyleOpen(o=>!o)}>
            Style <Icon n="chevron-down" size={13}/>
          </button>
          {styleOpen && <div className="rte-menu">
            <button onMouseDown={e=>e.preventDefault()} onClick={()=>setBlock('P')}>Normal text</button>
            <button onMouseDown={e=>e.preventDefault()} onClick={()=>setBlock('H2')} style={{fontWeight:800,fontSize:'1.05rem'}}>Title</button>
            <button onMouseDown={e=>e.preventDefault()} onClick={()=>setBlock('H3')} style={{fontWeight:800,color:'var(--text-brand)'}}>Heading</button>
            <button onMouseDown={e=>e.preventDefault()} onClick={()=>setBlock('BLOCKQUOTE')} style={{fontStyle:'italic',color:'var(--text-muted)'}}>Quote</button>
          </div>}
        </div>
        <span className="rte-sep"/>
        <Tb c="bold" icon={<Icon n="bold" size={15}/>} label="Bold"/>
        <Tb c="italic" icon={<Icon n="italic" size={15}/>} label="Italic"/>
        <Tb c="underline" icon={<Icon n="underline" size={15}/>} label="Underline"/>
        <Tb c="strikeThrough" icon={<Icon n="strikethrough" size={15}/>} label="Strikethrough"/>
        <span className="rte-sep"/>
        <Tb c="insertUnorderedList" icon={<Icon n="list-bullet" size={16}/>} label="Bulleted list"/>
        <Tb c="insertOrderedList" icon={<Icon n="list-ordered" size={16}/>} label="Numbered list"/>
        <button type="button" className="rte-btn" title="Link" aria-label="Link" onMouseDown={e=>e.preventDefault()} onClick={addLink}><Icon n="link2" size={15}/></button>
      </div>
      <div ref={ref} className="rte-area is-empty" contentEditable suppressContentEditableWarning
        data-ph={placeholder} onInput={emit} onBlur={emit} />
      {templates && <div style={{display:'flex',gap:6,flexWrap:'wrap',padding:'8px',borderTop:'1px solid var(--border-soft)',background:'var(--surface-sunken)'}}>
        {templates.map(([label,body])=>(
          <button key={label} type="button" onMouseDown={e=>e.preventDefault()} onClick={()=>insertTpl(body)}
            style={{padding:'5px 11px',borderRadius:'var(--radius-pill)',border:'1px solid var(--border-default)',
            background:'var(--paper)',cursor:'pointer',fontFamily:'var(--font-sans)',fontSize:11,fontWeight:700,color:'var(--text-brand)'}}>+ {label}</button>
        ))}
      </div>}
    </div>
  );
}

function RichText({ text, size='var(--text-sm)' }) {
  const bold=(line,k)=>line.split(/(\*\*[^*]+\*\*)/g).map((seg,i)=>
    /^\*\*[^*]+\*\*$/.test(seg)
      ? <strong key={k+'-'+i} style={{color:'var(--text-strong)'}}>{seg.slice(2,-2)}</strong>
      : seg);
  const lines=String(text).split('\n');
  const out=[]; let list=null, listType=null;
  const flush=()=>{
    if(!list) return;
    const Tag=listType==='ol'?'ol':'ul';
    out.push(<Tag key={'l'+out.length} style={{margin:'4px 0 8px',paddingLeft:22,display:'flex',
      flexDirection:'column',gap:3}}>{list}</Tag>);
    list=null; listType=null;
  };
  lines.forEach((raw,i)=>{
    const line=raw.trim();
    const mBul=line.match(/^[-•*]\s+(.*)/);
    const mNum=line.match(/^\d+[.)]\s+(.*)/);
    const mHead=line.match(/^#{1,3}\s+(.*)/);
    if(mBul){
      if(listType&&listType!=='ul') flush();
      listType='ul'; list=list||[];
      list.push(<li key={i} style={{fontSize:size,color:'var(--text-body)',lineHeight:1.55}}>{bold(mBul[1],i)}</li>);
      return;
    }
    flush();
    if(!line){ out.push(<div key={i} style={{height:8}} />); return; }
    // Keep the teacher's explicit numbers exactly as typed (don't auto-renumber).
    if(mNum){
      out.push(<div key={i} style={{fontSize:size,fontWeight:700,color:'var(--text-strong)',margin:'6px 0 2px'}}>{bold(line,i)}</div>);
      return;
    }
    if(mHead){
      out.push(<div key={i} style={{fontSize:size,fontWeight:800,color:'var(--text-strong)',
        margin:'6px 0 2px'}}>{bold(mHead[1],i)}</div>);
      return;
    }
    if(/^[^.!?]{2,48}:$/.test(line)){
      out.push(<div key={i} style={{fontSize:size,fontWeight:700,color:'var(--text-brand)',
        margin:'6px 0 2px'}}>{line}</div>);
      return;
    }
    out.push(<div key={i} style={{fontSize:size,color:'var(--text-body)',lineHeight:1.6}}>{bold(line,i)}</div>);
  });
  flush();
  return <div>{out}</div>;
}

function SessionForm({ open, session, onSave, onDelete, onClose }) {
  const sun=upcomingSundays(14);
  const blank={title:'',scripture:'',theme:'',date:dk(sun[0]),notes:'',notesHtml:'',materials:''};
  const [f,setF]=useState(blank);
  const [err,setErr]=useState({});
  const [confirm,setConfirm]=useState(false);

  useEffect(()=>{
    if(open){
      setF(session?{title:session.title,scripture:session.scripture||'',theme:session.theme||'',
        date:session.date,notes:session.notes||'',notesHtml:session.notesHtml||plainToHtml(session.notes||''),
        materials:(session.materials||[]).join(', ')}:blank);
      setErr({}); setConfirm(false);
    }
  },[open,session]);

  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  // Upcoming Sundays, plus this session's saved date if it falls outside that window.
  const dateOptions=(()=>{
    const ks=sun.map(dk);
    if(f.date && !ks.includes(f.date)) return [f.date,...ks].sort();
    return ks;
  })();
  const go=()=>{
    if(!f.title.trim()){setErr({title:'Title required'});return;}
    onSave({title:f.title.trim(),scripture:f.scripture.trim(),theme:f.theme.trim(),date:f.date,
      notes:(f.notes||'').trim(),notesHtml:f.notesHtml||'',materials:f.materials.split(',').map(m=>m.trim()).filter(Boolean)});

    <Modal open={open} onClose={onClose} title={session?'Edit session':'Plan session'}

        </div>}

        <Btn variant="primary" size="sm" onClick={go}>Save</Btn>
      </>}>

        <Input label="Lesson title" placeholder="e.g. The Good Samaritan" value={f.title} onChange={set('title')} required error={err.title} />

            Date <span style={{color:'var(--coral-500)'}}>*</span>
          </label>
          <select value={f.date} onChange={set('date')} style={{width:'100%',padding:'10px 14px',
            borderRadius:'var(--radius-md)',border:'1.5px solid var(--border-default)',
            background:'var(--paper)',fontFamily:'var(--font-sans)',fontSize:'var(--text-md)',
            color:'var(--text-strong)',outline:'none'}}>
            {dateOptions.map(k=><option key={k} value={k}>{fmtFull(k)}</option>)}
          </select>
        </div>
        <div>
          <label style={{display:'block',fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)',marginBottom:6}}>Notes / lesson plan</label>
          <RichEditor key={session?session.id:'new'} html={session?(session.notesHtml||plainToHtml(session.notes||'')):''}
            onChange={(htmlVal,plainVal)=>setF(p=>({...p,notesHtml:htmlVal,notes:plainVal}))}
            placeholder="Key points, discussion questions, activities… Use the toolbar for headings, bold, and lists."
            templates={[
              ['Lesson outline','Opening prayer & welcome:\n\nBible story:\n- \n\nMemory verse:\n\nDiscussion questions:\n1. \n2. \n\nActivity / game:\n\nClosing prayer:'],
              ['Story + craft','Bible story:\n- \n\nKey lesson:\n\nCraft / activity:\n- Materials: \n- Steps: \n\nMemory verse:'],
            ]} />
        </div>
        <Input label="Materials needed" placeholder="Bible, worksheets, colored pencils…" value={f.materials} onChange={set('materials')} hint="Separate with commas" />
      </div>
    </Modal>
  );
}

/* ── CLASSES ── */
function Classes({ classes, students, attendance, onAdd, onEdit, onDelete, onOpenClass, t=s=>s }) {
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const isDesk=useMedia('(min-width:1024px)');
  const today=dk(currentSunday());
  const todayAtt=attendance[today]||{};
  const editing=classes.find(c=>c.id===editId);
  const countIn=cid=>students.filter(s=>s.classId===cid).length;
  const presentIn=cid=>students.filter(s=>s.classId===cid&&todayAtt[s.id]===true).length;

  return (
    <div className="page" style={{maxWidth:isDesk?1240:760,margin:'0 auto',padding:isDesk?'8px 36px 32px':undefined}}>
      <div style={{padding:'var(--space-5) var(--space-4) var(--space-3)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <h1 style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-strong)',letterSpacing:'-.02em'}}>{t('Classes')}</h1>
            <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)'}}>{classes.length} age-grouped {classes.length===1?'class':'classes'}</div>
          </div>
          <Btn variant="primary" size="sm" iL={<Icon n="plus" size={15} />} onClick={()=>{setEditId(null);setShowForm(true);}}>{t('New class')}</Btn>
        </div>
      </div>
      <div style={{padding:'0 var(--space-4)'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'var(--space-4)'}}>
          {classes.map((c,i)=>(
            <div key={c.id} className="stagger" style={{animationDelay:`${i*70}ms`}}>
              <ClassCard cls={c} count={countIn(c.id)} present={presentIn(c.id)}
                onClick={()=>onOpenClass(c.id)} onEdit={()=>{setEditId(c.id);setShowForm(true);}} />
            </div>
          ))}
        </div>
        {classes.length===0 && (
          <div style={{textAlign:'center',padding:'var(--space-7) 0',color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>
            No classes yet — tap “New class”.
          </div>
        )}
        <div style={{height:12}} />
      </div>
      <ClassForm open={showForm} klass={editing} studentCount={editId?countIn(editId):0}
        onSave={data=>{ editId?onEdit({...data,id:editId}):onAdd(data); setShowForm(false); setEditId(null); }}
        onDelete={editId&&classes.length>1?()=>{onDelete(editId);setShowForm(false);setEditId(null);}:null}
        onClose={()=>{setShowForm(false);setEditId(null);}} />
    </div>
  );
}

function ClassForm({ open, klass, studentCount=0, onSave, onDelete, onClose }) {
  const blank={name:'',ageRange:'',room:'',teachers:[''],tone:'navy'};
  const [f,setF]=useState(blank);
  const [confirm,setConfirm]=useState(false);
  useEffect(()=>{
    if(open){
      const ts=klass?classTeachers(klass):[];
      setF(klass?{name:klass.name||'',ageRange:klass.ageRange||'',room:klass.room||'',teachers:ts.length?ts:[''],tone:klass.tone||'navy'}:blank);
      setConfirm(false);
    }
  },[open,klass]);
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const setTeacher=(i,v)=>setF(p=>({...p,teachers:p.teachers.map((t,j)=>j===i?v:t)}));
  const addTeacher=()=>setF(p=>({...p,teachers:[...p.teachers,'']}));
  const removeTeacher=i=>setF(p=>({...p,teachers:p.teachers.filter((_,j)=>j!==i)}));
  const go=()=>onSave({name:f.name.trim(),ageRange:f.ageRange.trim(),room:f.room.trim(),
    teachers:f.teachers.map(t=>t.trim()).filter(Boolean),tone:f.tone});

  return (
    <Modal open={open} onClose={onClose} title={klass?'Edit class':'New class'}
      footer={<>
        {onDelete&&!confirm&&<Btn variant="ghost" size="sm" style={{color:'var(--danger-500)',marginRight:'auto'}} onClick={()=>setConfirm(true)}>
          <Icon n="trash-2" size={15} style={{marginRight:4}} />Delete</Btn>}
        {confirm&&<div style={{display:'flex',gap:8,marginRight:'auto',alignItems:'center'}}>
          <span style={{fontSize:'var(--text-sm)',color:'var(--danger-500)',fontWeight:600}}>Delete class?</span>
          <Btn variant="danger" size="sm" onClick={onDelete}>Delete</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>setConfirm(false)}>Cancel</Btn>
        </div>}
        <Btn variant="ghost" size="sm" onClick={onClose}>Cancel</Btn>
        <Btn variant="primary" size="sm" onClick={go}>Save</Btn>
      </>}>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <Input label="Class name" placeholder="e.g. Pathfinders (leave blank to name later)" value={f.name} onChange={set('name')} hint="You can name it whenever you're ready." />
        <Input label="Age range" placeholder="e.g. Ages 10–14" value={f.ageRange} onChange={set('ageRange')} />
        <Input label="Room / location" placeholder="e.g. Upper hall" value={f.room} onChange={set('room')} />
        <div>
          <label style={{display:'block',fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)',marginBottom:6}}>Teachers</label>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {f.teachers.map((t,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'center'}}>
                <input value={t} onChange={e=>setTeacher(i,e.target.value)} placeholder={i===0?"Lead teacher's name":"Another teacher's name"}
                  style={{flex:1,padding:'10px 14px',borderRadius:'var(--radius-md)',border:'1.5px solid var(--border-default)',
                    background:'var(--paper)',fontFamily:'var(--font-sans)',fontSize:'var(--text-md)',color:'var(--text-strong)',outline:'none'}}
                  onFocus={e=>e.target.style.borderColor='var(--navy-600)'} onBlur={e=>e.target.style.borderColor='var(--border-default)'} />
                {f.teachers.length>1 && (
                  <button onClick={()=>removeTeacher(i)} aria-label="Remove teacher" style={{width:38,height:38,flexShrink:0,
                    borderRadius:'50%',border:'none',background:'var(--surface-sunken)',color:'var(--text-muted)',cursor:'pointer',
                    display:'flex',alignItems:'center',justifyContent:'center'}}><Icon n="x" size={16} /></button>
                )}
              </div>
            ))}
          </div>
          <button onClick={addTeacher} style={{display:'inline-flex',alignItems:'center',gap:5,marginTop:8,background:'none',
            border:'none',cursor:'pointer',color:'var(--link)',fontWeight:600,fontSize:'var(--text-sm)',fontFamily:'var(--font-sans)',padding:0}}>
            <Icon n="plus" size={15} /> Add another teacher
          </button>
        </div>
        <div>
          <label style={{display:'block',fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)',marginBottom:8}}>Colour</label>
          <div style={{display:'flex',gap:10}}>
            {CLASS_TONES.map(t=>(
              <button key={t} onClick={()=>setF(p=>({...p,tone:t}))} aria-label={t} style={{width:34,height:34,borderRadius:'50%',
                background:`var(--${t}-500)`,border:f.tone===t?'3px solid var(--navy-800)':'3px solid transparent',
                cursor:'pointer',outline:'1px solid var(--border-soft)'}} />
            ))}
          </div>
        </div>
        {klass && <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',background:'var(--surface-sunken)',
          borderRadius:'var(--radius-md)',padding:'10px 12px'}}>
          {studentCount} student{studentCount!==1?'s':''} in this class. Move students between classes from the Students tab.
        </div>}
      </div>
    </Modal>
  );
}

/* ── REPORTS ── */
function Reports({ students, classes, attendance, t=s=>s }) {
  const isDesk=useMedia('(min-width:1024px)');
  const [classFilter,setClassFilter]=useState('all');
  const [range,setRange]=useState(12);
  const recorded=Object.keys(attendance).filter(k=>Object.keys(attendance[k]).length>0).sort();
  const dates=range==='all'?recorded:recorded.slice(-range);
  const roster=students.filter(s=>classFilter==='all'||s.classId===classFilter).sort(byName);
  const clsOf=id=>classes.find(c=>c.id===id);
  const rateFor=s=>{
    const m=dates.filter(d=>s.id in (attendance[d]||{}));
    if(!m.length) return null;
    return Math.round(m.filter(d=>attendance[d][s.id]===true).length/m.length*100);
  };
  const colTotals=dates.map(d=>{
    const r=attendance[d]||{};
    const inCol=roster.filter(s=>s.id in r);
    return { p:inCol.filter(s=>r[s.id]===true).length, n:inCol.length };
  });
  const rated=colTotals.filter(c=>c.n>0);
  const avg=rated.length?Math.round(rated.reduce((a,c)=>a+c.p/c.n,0)/rated.length*100):0;
  let best=null; colTotals.forEach((c,i)=>{ if(c.n>0){ const r=c.p/c.n; if(!best||r>best.r) best={r,i}; } });

  return (
    <div className="page" style={{maxWidth:isDesk?1240:680,margin:'0 auto',padding:isDesk?'8px 36px 32px':undefined}}>
      <div style={{padding:'var(--space-5) var(--space-4) var(--space-3)'}} className="no-print">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'var(--space-4)',gap:10,flexWrap:'wrap'}}>
          <div>
            <h1 style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-strong)',letterSpacing:'-.02em'}}>{t('Reports')}</h1>
            <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)'}}>{recorded.length} Sundays recorded</div>
          </div>
          <Btn variant="primary" size="sm" iL={<Icon n="printer" size={15} />} onClick={()=>window.print()}>Print</Btn>
        </div>

        {/* Filters */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {[{id:'all',label:'All classes',tone:null},...classes.map(c=>({id:c.id,label:className(c),tone:c.tone}))].map(f=>{
            const on=classFilter===f.id;
            return <button key={f.id} onClick={()=>setClassFilter(f.id)} style={{
              display:'flex',alignItems:'center',gap:7,cursor:'pointer',padding:'6px 12px',
              borderRadius:'var(--radius-pill)',fontFamily:'var(--font-sans)',fontSize:'var(--text-xs)',
              border:on?'1.5px solid var(--navy-800)':'1px solid var(--border-default)',
              background:on?'var(--navy-800)':'var(--surface-card)',
              color:on?'var(--cream-50)':'var(--text-muted)',fontWeight:on?700:500}}>
              {f.tone&&<span style={{width:8,height:8,borderRadius:'50%',background:`var(--${f.tone}-500)`}} />}
              {f.label}
            </button>;
          })}
          <span style={{marginLeft:'auto'}}>
            <select value={range} onChange={e=>setRange(e.target.value==='all'?'all':Number(e.target.value))}
              style={{padding:'7px 10px',borderRadius:'var(--radius-md)',border:'1px solid var(--border-default)',
                background:'var(--paper)',fontFamily:'var(--font-sans)',fontSize:'var(--text-xs)',color:'var(--text-body)',outline:'none'}}>
              <option value={8}>Last 8 Sundays</option>
              <option value={12}>Last 12 Sundays</option>
              <option value="all">Whole term</option>
            </select>
          </span>
        </div>

        {/* Summary chips */}
        {dates.length>0 && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'var(--space-3)',marginTop:'var(--space-4)'}}>
            {[[avg+'%','Average attendance'],[dates.length,'Sundays in range'],
              [best?fmtShort(dates[best.i]):'—','Best Sunday'+(best?` (${Math.round(best.r*100)}%)`:'')]].map(([v,l])=>(
              <div key={l} style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
                borderRadius:'var(--radius-lg)',padding:'var(--space-4)',boxShadow:'var(--shadow-xs)'}}>
                <div style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-brand)',lineHeight:1}}>{v}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:5}}>{l}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Register grid */}
      <div style={{padding:'0 var(--space-4)'}} className="print-area">
        {dates.length===0 ? (
          <div style={{textAlign:'center',padding:'var(--space-8) 0',color:'var(--text-muted)',fontSize:'var(--text-sm)'}} className="no-print">
            No attendance recorded yet — save a Sunday first and the register will appear here.
          </div>
        ) : (
          <div style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
            borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-xs)',overflowX:'auto'}}>
            <div style={{padding:'14px 16px 0',fontWeight:800,color:'var(--text-strong)',fontSize:'var(--text-md)'}}>
              FECMY Children Ministry — {t('Attendance')} register
              <span style={{fontWeight:500,color:'var(--text-muted)',fontSize:'var(--text-xs)',marginLeft:8}}>
                {classFilter==='all'?'All classes':className(clsOf(classFilter)||{})} · {fmtShort(dates[0])} – {fmtShort(dates[dates.length-1])}
              </span>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'var(--font-sans)',marginTop:10}}>
              <thead>
                <tr style={{background:'var(--surface-sunken)'}}>
                  <th style={{textAlign:'left',padding:'9px 14px',fontSize:10,fontWeight:700,color:'var(--text-muted)',
                    letterSpacing:'.05em',textTransform:'uppercase',position:'sticky',left:0,background:'var(--surface-sunken)'}}>{t('Students')}</th>
                  {dates.map(d=>(
                    <th key={d} style={{padding:'9px 5px',fontSize:9,fontWeight:700,color:'var(--text-muted)',whiteSpace:'nowrap'}}>{fmtShort(d)}</th>
                  ))}
                  <th style={{padding:'9px 12px',fontSize:10,fontWeight:700,color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase'}}>%</th>
                </tr>
              </thead>
              <tbody>
                {roster.map(s=>{
                  const r=rateFor(s);
                  return (
                    <tr key={s.id} style={{borderTop:'1px solid var(--border-soft)'}}>
                      <td style={{padding:'7px 14px',fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)',
                        whiteSpace:'nowrap',position:'sticky',left:0,background:'var(--surface-card)'}}>
                        {s.name}{s.visitor&&<span style={{marginLeft:6,fontSize:9,fontWeight:700,color:'var(--grape-500)'}}>{t('Visitor').toUpperCase()}</span>}
                      </td>
                      {dates.map(d=>{
                        const v=(attendance[d]||{})[s.id];
                        return <td key={d} style={{textAlign:'center',padding:'7px 5px'}}>
                          {v===true ? <span style={{display:'inline-flex',width:17,height:17,borderRadius:'50%',background:'var(--leaf-500)',alignItems:'center',justifyContent:'center'}}><Icon n="check" size={10} color="#fff" /></span>
                          : v===false ? <span style={{display:'inline-flex',width:17,height:17,borderRadius:'50%',background:'var(--coral-100)',alignItems:'center',justifyContent:'center'}}><Icon n="x" size={9} color="#B23A2C" /></span>
                          : <span style={{display:'inline-block',width:17,height:17,borderRadius:'50%',background:'var(--ink-100)'}} />}
                        </td>;
                      })}
                      <td style={{textAlign:'center',padding:'7px 12px',fontSize:'var(--text-xs)',fontWeight:800,
                        color:r===null?'var(--text-subtle)':r>=80?'var(--leaf-500)':r>=60?'#286179':'#B23A2C'}}>{r===null?'—':r+'%'}</td>
                    </tr>
                  );
                })}
                <tr style={{borderTop:'2px solid var(--border-default)',background:'var(--surface-sunken)'}}>
                  <td style={{padding:'9px 14px',fontSize:'var(--text-xs)',fontWeight:800,color:'var(--text-strong)',
                    position:'sticky',left:0,background:'var(--surface-sunken)'}}>{t('Checked in')}</td>
                  {colTotals.map((c,i)=>(
                    <td key={i} style={{textAlign:'center',padding:'9px 5px',fontSize:10,fontWeight:800,
                      color:'var(--text-strong)',whiteSpace:'nowrap'}}>{c.n?`${c.p}/${c.n}`:'—'}</td>
                  ))}
                  <td style={{textAlign:'center',padding:'9px 12px',fontSize:'var(--text-xs)',fontWeight:800,color:'var(--text-brand)'}}>{avg}%</td>
                </tr>
              </tbody>
            </table>
          </div>
        )}
        <div style={{height:12}} />
      </div>
    </div>
  );
}

        <Icon n="search" size={16} color="var(--navy-300)" />
        {!collapsed && <input value={q} placeholder="Search students…" onChange={e=>setQ(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter'&&q.trim()&&onSearch){ onSearch(q.trim()); setQ(''); } }} />}
      </div>

      <nav style={{display:'flex',flexDirection:'column',gap:3,flex:1,overflowY:'auto',marginTop:2}}>
        {!collapsed && <div style={{fontSize:10,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',
          color:'var(--navy-500)',padding:'6px 13px 8px'}}>Menu</div>}
        {TABS.map(({id,i,l})=>{
          const on=tab===id; const c=badgeFor(id);
          return (
            <button key={id} className={`side-item${on?' on':''}`} onClick={()=>onTab(id)}
              onMouseEnter={e=>showTip(e,t(l)+(c!=null?` · ${c}`:''))} onMouseLeave={hideTip}>
              <span className="side-ic"><Icon n={i} size={19} /></span>
              {!collapsed && t(l)}
              {!collapsed && c!=null && <span className="side-count">{c}</span>}
              {collapsed && c!=null && <span className="side-dot" />}
            </button>
          );
        })}
      </nav>

      {tip && (
        <div style={{position:'fixed',left:tip.x,top:tip.y,transform:'translateY(-50%)',zIndex:200,
          background:'var(--navy-900)',color:'var(--cream-50)',fontSize:'var(--text-xs)',fontWeight:600,
          padding:'7px 11px',borderRadius:8,boxShadow:'0 8px 22px rgba(0,0,0,.45)',whiteSpace:'nowrap',
          pointerEvents:'none',animation:'fadeIn 120ms ease'}}>{tip.label}</div>
      )}

      {/* Guide / help launcher */}
      <button className="side-item" onClick={onOpenGuide} style={{flex:'none'}}
        onMouseEnter={e=>showTip(e,t('Guide'))} onMouseLeave={hideTip}>
        <span className="side-ic"><Icon n="help-circle" size={19} /></span>
        {!collapsed && t('Guide')}
      </button>

      {/* Theme: segmented control when expanded, single toggle button when collapsed */}
      {collapsed ? (
        <button className="side-theme-single" onClick={()=>onToggleTheme&&onToggleTheme()}
          aria-label="Toggle dark mode" title={theme==='dark'?'Switch to light':'Switch to dark'}
          onMouseEnter={e=>showTip(e,theme==='dark'?'Light mode':'Dark mode')} onMouseLeave={hideTip}>
          <Icon n={theme==='dark'?'moon':'sun'} size={17} />
        </button>
      ) : (
        <div className="side-theme">
          {[['light','sun','Light'],['dark','moon','Dark']].map(([id,ic,label])=>(
            <button key={id} className={`side-theme-btn${theme===id?' on':''}`} onClick={()=>onToggleTheme&&onToggleTheme(id)}>
              <Icon n={ic} size={15} /><span>{label}</span>
            </button>
          ))}
        </div>
      )}

      <div className="side-foot" onClick={onOpenSettings} title={collapsed?`${name} · Settings`:'Settings'}>
        <Av name={name} size="sm" />
        {!collapsed && <>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:'var(--cream-50)',fontWeight:700,fontSize:'var(--text-sm)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
            <div style={{color:'var(--navy-300)',fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{email}</div>
          </div>
          <button onClick={e=>{e.stopPropagation();onOpenSettings&&onOpenSettings();}} aria-label="Settings"
            style={{width:32,height:32,borderRadius:'50%',border:'none',background:'rgba(255,255,255,.08)',
            color:'var(--navy-300)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icon n="settings" size={15} />
          </button>
          {onSignOut && (
            <button onClick={e=>{e.stopPropagation();onSignOut();}} aria-label="Sign out"
              style={{width:32,height:32,borderRadius:'50%',border:'none',background:'rgba(255,255,255,.08)',
              color:'var(--navy-300)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Icon n="log-out" size={15} />
            </button>
          )}
        </>}
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [tab,setTab]=useState('dashboard');
  const [students,setStudents]=useState(()=>load(SK.children,null)??INITIAL_STUDENTS);
  const [attendance,setAttendance]=useState(()=>load(SK.attendance,{}));
  const [sessions,setSessions]=useState(()=>load(SK.sessions,[]));
  const [classes,setClasses]=useState(()=>load(SK.classes,null)??INITIAL_CLASSES);
  const [activeClassId,setActiveClassId]=useState(()=>{
    const cs=load(SK.classes,null)??INITIAL_CLASSES; return cs[0]?cs[0].id:null;
  });
  const [lang,setLang]=useState(()=>load(LANG_KEY,'en'));
  const t=s=>tr(lang,s);
  const setLanguage=l=>{ setLang(l); save(LANG_KEY,l); };

  // Theme (light / dark) — applied to <html data-theme> and persisted.
  const [theme,setTheme]=useState(()=>load('fecmy_theme','light'));
  useEffect(()=>{ document.documentElement.setAttribute('data-theme',theme); },[theme]);
  const toggleTheme=v=>{ const next=v||(theme==='dark'?'light':'dark'); setTheme(next); save('fecmy_theme',next); };

  // Teacher display name — shown on lesson plans this device creates/edits.
  const [teacher,setTeacher]=useState(()=>load('fecmy_teacher',''));
  const saveTeacher=v=>{ setTeacher(v); save('fecmy_teacher',v); };

  // Latest data snapshot for the sync engine (state is async; this is not)
  const dataRef=useRef(null);
  if(dataRef.current===null) dataRef.current={students,classes,sessions,attendance};

  const saveS=v=>{setStudents(v);save(SK.children,v);dataRef.current={...dataRef.current,students:v};schedulePush();};
  const saveSess=v=>{setSessions(v);save(SK.sessions,v);dataRef.current={...dataRef.current,sessions:v};schedulePush();};
  const saveCls=v=>{setClasses(v);save(SK.classes,v);dataRef.current={...dataRef.current,classes:v};schedulePush();};
  const saveAtt=v=>{setAttendance(v);save(SK.attendance,v);dataRef.current={...dataRef.current,attendance:v};schedulePush();};

  // Toast notifications
  const [toast,setToast]=useState(null);
  const notify=(msg,icon)=>setToast({msg,icon,key:Date.now()});
  useEffect(()=>{
    if(!toast) return;
    const t=setTimeout(()=>setToast(null),2400);
    return()=>clearTimeout(t);
  },[toast]);

  /* ── Cloud sync (Supabase) ───────────────────────────────
     status: off → not configured · signedout → configured, needs login
             syncing · synced · error                              */
  const sbRef=useRef(null);
  const dirtyRef=useRef(false);
  const pushTimer=useRef(null);
  const [cloud,setCloud]=useState(()=>{
    const c=cloudCfg();
    return { cfg:c, user:null, status:c?'connecting':'off', last:null, err:null };
  });
  const cloudRef=useRef(cloud);
  useEffect(()=>{ cloudRef.current=cloud; },[cloud]);

  const getClient=()=>{
    if(sbRef.current) return sbRef.current;
    const c=cloudCfg();
    if(!c||!window.supabase) return null;
    try{ sbRef.current=window.supabase.createClient(c.url,c.key); }catch{ return null; }
    return sbRef.current;
  };

  async function pushAllNow(){
    const cl=getClient(); if(!cl) return;
    const d=dataRef.current, now=new Date().toISOString();
    const up=(t,rows)=>cl.from(t).upsert(rows);
    await up('students',d.students.map(s=>({id:s.id,data:s,updated_at:now})));
    await up('classes',d.classes.map(c=>({id:c.id,data:c,updated_at:now})));
    await up('sessions',d.sessions.map(s=>({id:s.id,data:s,updated_at:now})));
    const dates=Object.keys(d.attendance);
    if(dates.length) await up('attendance',dates.map(ds=>({date:ds,marks:d.attendance[ds],updated_at:now})));
    // remove rows deleted locally
    const prune=async(t,ids)=>{ if(ids.length) await cl.from(t).delete().not('id','in',`(${ids.join(',')})`);
      else await cl.from(t).delete().neq('id',''); };
    await prune('students',d.students.map(s=>s.id));
    await prune('classes',d.classes.map(c=>c.id));
    await prune('sessions',d.sessions.map(s=>s.id));
    dirtyRef.current=false;
  }

  function schedulePush(){
    const c=cloudRef.current;
    if(!c.user) return;
    dirtyRef.current=true;
    clearTimeout(pushTimer.current);
    pushTimer.current=setTimeout(async()=>{
      try{
        setCloud(p=>({...p,status:'syncing'}));
        await pushAllNow();
        setCloud(p=>({...p,status:'synced',last:new Date(),err:null}));
      }catch(e){ setCloud(p=>({...p,status:'error',err:e.message||String(e)})); }
    },1500);
  }

  function adoptCloud(st,csx,ssx,att){
    const studs=st.map(r=>r.data), cls=csx.map(r=>r.data), sess=ssx.map(r=>r.data);
    const at={}; att.forEach(r=>{ at[r.date]=r.marks; });
    dataRef.current={students:studs,classes:cls,sessions:sess,attendance:at};
    setStudents(studs); save(SK.children,studs);
    setClasses(cls); save(SK.classes,cls);
    setSessions(sess); save(SK.sessions,sess);
    setAttendance(at); save(SK.attendance,at);
    if(cls.length && !cls.find(c=>c.id===activeClassId)) setActiveClassId(cls[0].id);
  }

  async function fullSync(){
    const cl=getClient(); if(!cl) return;
    try{
      setCloud(p=>({...p,status:'syncing'}));
      const [st,csx,ssx,att]=await Promise.all([
        cl.from('students').select('*'), cl.from('classes').select('*'),
        cl.from('sessions').select('*'), cl.from('attendance').select('*'),
      ]);
      for(const r of [st,csx,ssx,att]) if(r.error) throw r.error;
      if(st.data.length>0||csx.data.length>0){
        adoptCloud(st.data,csx.data,ssx.data,att.data);   // cloud is the team's truth
      } else {
        await pushAllNow();                                // first device seeds the cloud
      }
      setCloud(p=>({...p,status:'synced',last:new Date(),err:null}));
    }catch(e){ setCloud(p=>({...p,status:'error',err:e.message||String(e)})); }
  }

  async function pullLatest(){
    const cl=getClient(); if(!cl||dirtyRef.current) return;
    try{
      const [st,csx,ssx,att]=await Promise.all([
        cl.from('students').select('*'), cl.from('classes').select('*'),
        cl.from('sessions').select('*'), cl.from('attendance').select('*'),
      ]);
      for(const r of [st,csx,ssx,att]) if(r.error) return;
      if(st.data.length===0&&csx.data.length===0) return;
      const incoming={students:st.data.map(r=>r.data),classes:csx.data.map(r=>r.data),
        sessions:ssx.data.map(r=>r.data),attendance:Object.fromEntries(att.data.map(r=>[r.date,r.marks]))};
      if(JSON.stringify(incoming)!==JSON.stringify(dataRef.current)){
        adoptCloud(st.data,csx.data,ssx.data,att.data);
        setCloud(p=>({...p,last:new Date()}));
      }
    }catch{}
  }

  // Restore session on load; poll for team changes while signed in
  useEffect(()=>{
    const cl=getClient();
    if(!cl){ if(cloud.cfg) setCloud(p=>({...p,status:'error',err:'Sync library not loaded — check internet'})); return; }
    cl.auth.getSession().then(({data})=>{
      if(data&&data.session){ setCloud(p=>({...p,user:data.session.user.email,status:'syncing'})); fullSync(); }
      else setCloud(p=>({...p,status:'signedout'}));
    }).catch(()=>setCloud(p=>({...p,status:'signedout'})));
  },[]);
  useEffect(()=>{
    if(!cloud.user) return;
    const iv=setInterval(pullLatest,45000);
    const onVis=()=>{ if(!document.hidden) pullLatest(); };
    document.addEventListener('visibilitychange',onVis);
    return()=>{ clearInterval(iv); document.removeEventListener('visibilitychange',onVis); };
  },[cloud.user]);

  const cloudApi={
    connect:(url,key)=>{
      if(!window.supabase) throw new Error('Sync library not loaded — check your internet and reload');
      // Normalize whatever got pasted down to https://<ref>.supabase.co —
      // people paste the REST endpoint or the dashboard address by accident.
      let u=url.trim();
      if(!/^https?:\/\//i.test(u)) u='https://'+u;
      let parsed; try{ parsed=new URL(u); }catch{ throw new Error('That URL doesn’t look right — it should be like https://abcdefgh.supabase.co'); }
      const dash=parsed.hostname==='supabase.com'&&parsed.pathname.match(/\/project\/([a-z0-9-]+)/i);
      const base=dash?`https://${dash[1]}.supabase.co`:parsed.origin;
      if(!/\.supabase\.(co|in)$/i.test(new URL(base).hostname))
        throw new Error('Use the Project URL from Settings → Data API — it looks like https://abcdefgh.supabase.co');
      if(key.trim().length<20) throw new Error('That key looks too short — copy the full “anon public” key');
      save(CLOUD_CFG_KEY,{url:base,key:key.trim()});
      sbRef.current=null;
      if(!getClient()) throw new Error('Could not create client — check the URL and key');
      setCloud({cfg:load(CLOUD_CFG_KEY,null),user:null,status:'signedout',last:null,err:null});
    },
    signIn:async(email,pw)=>{
      const cl=getClient(); if(!cl) throw new Error('Not connected');
      const {error}=await cl.auth.signInWithPassword({email,password:pw});
      if(error) throw error;
      setCloud(p=>({...p,user:email,status:'syncing'}));
      await fullSync();
      notify('Signed in — data synced');
    },
    signUp:async(email,pw)=>{
      const cl=getClient(); if(!cl) throw new Error('Not connected');
      const {error}=await cl.auth.signUp({email,password:pw});
      if(error) throw error;
      notify('Account created — if sign-in fails, confirm the email first');
    },
    signOut:()=>{ try{getClient()?.auth.signOut();}catch{} setCloud(p=>({...p,user:null,status:'signedout'})); },
    disconnect:()=>{ try{getClient()?.auth.signOut();}catch{} try{localStorage.removeItem(CLOUD_CFG_KEY);}catch{}
      sbRef.current=null;
      // fall back to the published team project (if baked in) rather than the connect form
      const def=cloudCfg();
      setCloud({cfg:def,user:null,status:def?'signedout':'off',last:null,err:null}); },
    syncNow:fullSync,
    backup:()=>{
      const d=dataRef.current;
      const payload={app:'fecmy-children-ministry',version:1,exportedAt:new Date().toISOString(),
        students:d.students,classes:d.classes,sessions:d.sessions,attendance:d.attendance};
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download='fecmy-backup-'+dk(new Date())+'.json'; a.click();
      notify('Backup downloaded');
    },
    restore:(data)=>{
      if(!data||!Array.isArray(data.students)||!Array.isArray(data.classes)) throw new Error('Not a valid FECMY backup file');
      saveS(data.students); saveCls(data.classes);
      saveSess(Array.isArray(data.sessions)?data.sessions:[]);
      saveAtt(data.attendance&&typeof data.attendance==='object'?data.attendance:{});
      if(data.classes[0]) setActiveClassId(data.classes[0].id);
      notify('Backup restored');
    },
  };

  const resetAll=()=>{
    [SK.children,SK.attendance,SK.sessions,SK.classes].forEach(k=>{ try{localStorage.removeItem(k);}catch{} });
    setStudents(INITIAL_STUDENTS); setAttendance({}); setSessions([]); setClasses(INITIAL_CLASSES);
    dataRef.current={students:INITIAL_STUDENTS,classes:INITIAL_CLASSES,sessions:[],attendance:{}};
    setActiveClassId(INITIAL_CLASSES[0].id); setTab('dashboard');
    schedulePush();
  };

  const openClass=(cid)=>{ setActiveClassId(cid); setTab('attendance'); };

  // Global search (desktop dashboard header) → jump to Students with the query
  const [studentSeed,setStudentSeed]=useState(null);
  const doSearch=q=>{ setStudentSeed({q,n:Date.now()}); setTab('students'); };

  // Settings sheet (lifted so the sidebar can open it from any tab)
  const [showSettings,setShowSettings]=useState(false);
  const alertCount=students.filter(s=>absenceStreak(s.id,attendance)>=3).length;

  // Guided tour — auto-opens on first visit, re-openable anytime.
  const [showGuide,setShowGuide]=useState(()=>!load('fecmy_guide_seen',false));
  const openGuide=()=>setShowGuide(true);
  const closeGuide=()=>{ setShowGuide(false); save('fecmy_guide_seen',true); };
  const [collapsed,setCollapsed]=useState(()=>load('fecmy_sidebar_collapsed',false));
  const toggleCollapse=()=>{ const v=!collapsed; setCollapsed(v); save('fecmy_sidebar_collapsed',v); };

  // Visitor quick-add: just create the flagged student and return its id.
  // The Attendance screen marks them present in its LOCAL marks so unsaved
  // ticks are preserved; the visitor is persisted when the teacher hits Save.
  const addVisitor=(name,phone,classId,date)=>{
    const v={id:uid(),name,classId,age:'',parentName:'',parentPhone:phone||'',notes:'',
      visitor:true,firstVisit:date,addedAt:dk(new Date())};
    saveS([...dataRef.current.students,v]);
    notify(t('Visitor')+' · '+name+' ✓');
    return v.id;
  };

  const screens={
    dashboard:<Dashboard students={students} attendance={attendance} sessions={sessions} classes={classes}
      onNav={setTab} onReset={resetAll} onOpenClass={openClass} onSearch={doSearch}
      cloud={cloud} cloudApi={cloudApi} lang={lang} setLanguage={setLanguage} t={t}
      teacher={teacher} setTeacher={saveTeacher} onOpenSettings={()=>setShowSettings(true)} onOpenGuide={openGuide} />,
    classes:<Classes classes={classes} students={students} attendance={attendance} t={t}
      onAdd={d=>{saveCls([...classes,{...d,id:uid()}]);notify('Class created');}}
      onEdit={d=>{saveCls(classes.map(c=>c.id===d.id?d:c));notify('Class updated');}}
      onDelete={id=>{ saveCls(classes.filter(c=>c.id!==id));
        // reassign orphaned students to the first remaining class
        const rest=classes.filter(c=>c.id!==id); const fallback=rest[0]&&rest[0].id;
        if(fallback) saveS(students.map(s=>s.classId===id?{...s,classId:fallback}:s));
        notify('Class deleted'); }}
      onOpenClass={openClass} />,
    students:<Students students={students} classes={classes} attendance={attendance} seed={studentSeed} t={t}
      onAdd={d=>{saveS([...students,{...d,id:uid(),addedAt:dk(new Date())}]);notify('Student added');}}
      onEdit={d=>{saveS(students.map(s=>s.id===d.id?d:s));notify('Student updated');}}
      onDelete={id=>{saveS(students.filter(s=>s.id!==id));notify('Student removed');}} />,
    attendance:<Attendance students={students} classes={classes} attendance={attendance} t={t}
      activeClassId={activeClassId} setActiveClassId={setActiveClassId} notify={notify}
      onAddVisitor={addVisitor} onSave={(ds,marks)=>{
        saveAtt({...attendance,[ds]:{...(attendance[ds]||{}),...marks}});
      }} />,
    sessions:(()=>{ // stamp who planned / edited (name from Settings, else signed-in email)
      const me=teacher.trim()||(cloud.user?cloud.user.split('@')[0]:'');
      return <Sessions sessions={sessions} t={t}
        onAdd={d=>{saveSess([...sessions,{...d,id:uid(),addedBy:me||undefined}]);notify('Session planned');}}
        onEdit={d=>{saveSess(sessions.map(s=>s.id===d.id?{...s,...d,editedBy:me||s.editedBy}:s));notify('Session updated');}}
        onDelete={id=>{saveSess(sessions.filter(s=>s.id!==id));notify('Session removed');}} />;
    })(),
    reports:<Reports students={students} classes={classes} attendance={attendance} t={t} />,
  };

  return (
    <>
      {/* Mobile */}
      <div style={{display:'block'}} className="desktop-hidden">
        <div className="safe-top" />
        <div key={tab} className="screen-enter">{screens[tab]}</div>
        <nav className="bottom-nav">
          {TABS.map(({id,i,l})=>(
            <button key={id} className={`nav-btn${tab===id?' active':''}`} onClick={()=>setTab(id)} style={{position:'relative'}}>
              {tab===id && <span style={{position:'absolute',top:0,left:'50%',marginLeft:-12,width:24,height:3,
                borderRadius:'0 0 3px 3px',background:'var(--nav-active)',animation:'navDot 220ms cubic-bezier(0.22,1,0.36,1)'}} />}
              <Icon n={i} size={22} color={tab===id?'var(--nav-active)':'var(--ink-400)'} />
              {t(l)}
            </button>
          ))}
        </nav>
      </div>

      {/* Desktop */}
      <div className={`desktop-shell${collapsed?' collapsed':''}`} style={{display:'none'}}>
        <Sidebar tab={tab} onTab={setTab} count={students.length} t={t}
          teacher={teacher} cloud={cloud} alerts={alertCount}
          onSearch={doSearch} onOpenSettings={()=>setShowSettings(true)} onSignOut={cloud.user?cloudApi.signOut:null}
          theme={theme} onToggleTheme={toggleTheme} collapsed={collapsed} onToggleCollapse={toggleCollapse} onOpenGuide={openGuide} />
        <main style={{overflowY:'auto',minWidth:0,background:'var(--surface-app)'}}>
          <div key={tab} className="screen-enter">{screens[tab]}</div>
        </main>
      </div>

      <SettingsSheet open={showSettings} onClose={()=>setShowSettings(false)} onReset={resetAll}
        students={students} attendance={attendance} sessions={sessions}
        cloud={cloud} cloudApi={cloudApi} lang={lang} setLanguage={setLanguage} t={t}
        teacher={teacher} setTeacher={saveTeacher} theme={theme} onToggleTheme={toggleTheme}
        onOpenGuide={()=>{ setShowSettings(false); openGuide(); }} />

      <GuideTour open={showGuide} onClose={closeGuide} lang={lang} setLanguage={setLanguage} t={t} />

      <Toast toast={toast} />

      <style>{`
        @media(min-width:768px){
          .desktop-hidden{display:none!important}
          .desktop-shell{display:grid!important}
        }
      `}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
