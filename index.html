// Invite links: opening <site-url>#join=<token> stores the project
// config on that device automatically — co-teachers never type it.
(function(){
  try{
    const m=location.hash.match(/#join=([^&]+)/);
    if(m){
      const [url,key]=atob(decodeURIComponent(m[1])).split('|');
      if(url&&key&&/^https:\/\//.test(url)){
        localStorage.setItem(CLOUD_CFG_KEY,JSON.stringify({url,key}));
        history.replaceState(null,'',location.pathname+location.search);
      }
    }
  }catch{}
})();

// Effective cloud config: device-stored first, then the published default.
function cloudCfg(){
  const c=load(CLOUD_CFG_KEY,null);
  if(c&&c.url&&c.key) return c;
  if(DEFAULT_CLOUD.url&&DEFAULT_CLOUD.key) return DEFAULT_CLOUD;
  return null;
}

/* ── Birthday helpers — birthday stored as "MM-DD" or "YYYY-MM-DD" ── */
function nextBirthdayInfo(bday){
  if(!bday) return null;
  const m=bday.match(/^(?:(\d{4})-)?(\d{2})-(\d{2})$/);
  if(!m) return null;
  const [,yr,mo,da]=m;
  const now=new Date(); now.setHours(0,0,0,0);
  let next=new Date(now.getFullYear(),Number(mo)-1,Number(da));
  if(next<now) next=new Date(now.getFullYear()+1,Number(mo)-1,Number(da));
  const days=Math.round((next-now)/86400000);
  const turning=yr?next.getFullYear()-Number(yr):null;
  return { days, turning, date:next };
}

function load(k, def) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch{return def;} }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch{} }
function uid() { return '_'+Math.random().toString(36).slice(2,9); }

function getSundays(n=14) {
  const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay()); // most recent Sunday (today if Sunday)
  return Array.from({length:n},(_,i)=>{ const x=new Date(d); x.setDate(x.getDate()-i*7); return x; });
}
// The "current" class Sunday = the nearest one: today if Sunday, the Sunday
// just gone early in the week (Mon–Wed), or the upcoming Sunday once we're
// past midweek (Thu–Sat). This is what the dashboard & attendance default to.
function currentSunday() {
  const d=new Date(); d.setHours(0,0,0,0);
  const dow=d.getDay(); // 0=Sun … 6=Sat
  const shift = dow===0 ? 0 : (dow<=3 ? -dow : 7-dow);
  d.setDate(d.getDate()+shift);
  return d;
}
// Current Sunday + recent past ones (for recording / back-filling attendance).
function recentSundays(n=14) {
  const base=currentSunday();
  return Array.from({length:n},(_,i)=>{ const x=new Date(base); x.setDate(x.getDate()-i*7); return x; });
}
// Upcoming Sundays only (for planning lessons): today if Sunday, then forward.
function upcomingSundays(n=14) {
  const d=new Date(); d.setHours(0,0,0,0);
  const dow=d.getDay();
  d.setDate(d.getDate()+(dow===0?0:7-dow)); // this Sunday or the next one
  return Array.from({length:n},(_,i)=>{ const x=new Date(d); x.setDate(x.getDate()+i*7); return x; });
}
// Local date key (YYYY-MM-DD) — NOT toISOString(), which is UTC and would
// roll a local-midnight Sunday back to Saturday in +UTC timezones.
function dk(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmt(ds,opts){ return new Date(ds+'T00:00:00').toLocaleDateString('en-US',opts); }
function fmtShort(ds){ return fmt(ds,{month:'short',day:'numeric'}); }
function fmtFull(ds){ return fmt(ds,{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }

function absenceStreak(id, att) {
  const keys = Object.keys(att).sort().reverse();
  let n=0;
  for(const k of keys){
    const r=att[k];
    if(!(id in r)) continue;
    if(r[id]===true) break;
    n++;
  }
  return n;
}
// Consecutive Sundays *present* (most recent recorded first); skips unmarked
// Sundays, breaks on the first absence. Mirrors absenceStreak.
function presenceStreak(id, att) {
  const keys = Object.keys(att).sort().reverse();
  let n=0;
  for(const k of keys){
    const r=att[k];
    if(!(id in r)) continue;
    if(r[id]!==true) break;
    n++;
  }
  return n;
}
function attendanceRate(id, att, weeks=8) {
  const keys=Object.keys(att).sort().reverse().slice(0,weeks);
  const marked=keys.filter(k=>id in att[k]);
  if(!marked.length) return null;
  return Math.round(marked.filter(k=>att[k][id]===true).length/marked.length*100);
}

// Per-student history over the last n Sundays: 'p' present, 'a' absent, 'u' unmarked.
function studentHistory(id, att, n=10) {
  return getSundays(n).map(d=>{
    const k=dk(d); const r=att[k]||{};
    return { date:k, mark: r[id]===true?'p':r[id]===false?'a':'u' };
  }).reverse();
}

function fireConfetti() {
  const colors=['#F4674F','#16B981','#4DA3C4','#8E6FB0','#2480C4','#F5C04E'];
  const root=document.createElement('div');
  root.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden';
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    const sz=6+Math.random()*8;
    el.style.cssText=`position:absolute;top:-20px;left:${Math.random()*100}%;width:${sz}px;height:${sz*0.6}px;`+
      `background:${colors[i%colors.length]};opacity:0;border-radius:2px;transform:rotate(${Math.random()*360}deg);`+
      `animation:confettiFall ${1.5+Math.random()*1.3}s ${Math.random()*0.5}s cubic-bezier(0.25,0.46,0.45,0.94) forwards`;
    root.appendChild(el);
  }
  document.body.appendChild(root);
  setTimeout(()=>root.remove(),3500);
}

// Responsive helper — true when the media query matches.
function useMedia(q) {
  const [m,setM]=useState(()=>window.matchMedia(q).matches);
  useEffect(()=>{
    const mm=window.matchMedia(q);
    const f=e=>setM(e.matches);
    mm.addEventListener('change',f);
    return()=>mm.removeEventListener('change',f);
  },[q]);
  return m;
}

// Animates a number from its previous value (0 on first mount).
function useCountUp(target, dur=650) {
  const [v,setV]=useState(typeof target==='number'?0:target);
  const prev=useRef(0);
  useEffect(()=>{
    if(typeof target!=='number'){ setV(target); return; }
    const from=typeof prev.current==='number'?prev.current:0;
    prev.current=target;
    if(from===target){ setV(target); return; }
    let start=null, raf;
    const step=ts=>{
      if(start===null) start=ts;
      const p=Math.min(1,(ts-start)/dur), e=1-Math.pow(1-p,3);
      setV(Math.round(from+(target-from)*e));
      if(p<1) raf=requestAnimationFrame(step);
    };
    raf=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(raf);
  },[target]);
  return v;
}

function Icon({ n, size=20, color, style={} }) {
  const d = ICONS[n];
  if(!d) return null;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color||'currentColor'} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"
      style={{display:'inline-block',verticalAlign:'middle',flexShrink:0,...style}}>
      {d.split('M').filter(Boolean).map((seg,i)=>(
        <path key={i} d={'M'+seg} />
      ))}
    </svg>
  );
}

function Logo({ color='var(--navy-800)', size=44, style={} }) {
  return (
    <svg viewBox="0 0 1080 1080" width={size} height={size} fill={color}
      style={{display:'block',flexShrink:0,...style}}>
      {LOGO_PATHS.map((d,i)=><path key={i} d={d} />)}
    </svg>
  );
}

/* ── DESIGN SYSTEM COMPONENTS ── */
function Btn({ variant='primary', size='md', full, disabled, iL, iR, onClick, children, style={} }) {
  const sz = {sm:{f:'var(--text-sm)',p:'8px 14px',g:6,r:'var(--radius-md)'},
               md:{f:'var(--text-md)',p:'11px 20px',g:8,r:'var(--radius-md)'},
               lg:{f:'var(--text-lg)',p:'14px 24px',g:10,r:'var(--radius-lg)'}}[size]||{f:'var(--text-md)',p:'11px 20px',g:8,r:'var(--radius-md)'};
  const vs = {
    primary:{bg:'var(--navy-800)',fg:'var(--cream-50)',border:'1px solid var(--navy-800)'},
    accent:{bg:'var(--cream-50)',fg:'var(--navy-900)',border:'1px solid var(--cream-50)',boxShadow:'var(--shadow-md)'},
    secondary:{bg:'var(--surface-card)',fg:'var(--text-brand)',border:'1.5px solid var(--text-brand)'},
    ghost:{bg:'transparent',fg:'var(--text-brand)',border:'1px solid transparent'},
    danger:{bg:'var(--danger-500)',fg:'#fff',border:'1px solid var(--danger-500)'},
    leaf:{bg:'var(--leaf-100)',fg:'#0E7B55',border:'1px solid var(--leaf-100)'},
  }[variant]||{bg:'var(--navy-800)',fg:'var(--cream-50)',border:'1px solid var(--navy-800)'};
  return (
    <button disabled={disabled} onClick={onClick} style={{
      display:'inline-flex',alignItems:'center',justifyContent:'center',
      gap:sz.g,fontFamily:'var(--font-sans)',fontWeight:600,
      fontSize:sz.f,padding:sz.p,borderRadius:sz.r,
      cursor:disabled?'not-allowed':'pointer',width:full?'100%':'auto',
      opacity:disabled?.5:1,lineHeight:1.1,whiteSpace:'nowrap',
      transition:'transform 120ms ease,filter 120ms ease',
      background:vs.bg,color:vs.fg,border:vs.border,boxShadow:vs.boxShadow||'none',
      ...style,
    }}
      onMouseEnter={e=>{if(!disabled)e.currentTarget.style.filter='brightness(1.06)';}}
      onMouseLeave={e=>{e.currentTarget.style.filter='none';e.currentTarget.style.transform='scale(1)';}}
      onMouseDown={e=>{if(!disabled)e.currentTarget.style.transform='scale(0.97)';}}
      onMouseUp={e=>{e.currentTarget.style.transform='scale(1)';}}
    >{iL}{children}{iR}</button>
  );
}

function Badge({ tone='navy', size='md', children, style={} }) {
  const t={navy:{bg:'var(--navy-100)',fg:'var(--navy-800)'},
            coral:{bg:'var(--coral-100)',fg:'#B23A2C'},leaf:{bg:'var(--leaf-100)',fg:'#0E7B55'},
            sky:{bg:'var(--sky-100)',fg:'#286179'},grape:{bg:'var(--grape-100)',fg:'#5C4480'},
            success:{bg:'var(--success-100)',fg:'#0E7B55'},warning:{bg:'var(--warning-100)',fg:'#9A6A12'},
            danger:{bg:'var(--danger-100)',fg:'#A93B33'},neutral:{bg:'var(--ink-100)',fg:'var(--ink-700)'},
           }[tone]||{bg:'var(--navy-100)',fg:'var(--navy-800)'};
  const s=size==='sm'?{fontSize:'11px',padding:'2px 7px'}:{fontSize:'var(--text-xs)',padding:'4px 10px'};
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,background:t.bg,color:t.fg,
    borderRadius:'var(--radius-pill)',fontWeight:600,whiteSpace:'nowrap',...s,...style}}>{children}</span>;
}

function Av({ name='', size='md', style={} }) {
  const dim={xs:26,sm:34,md:42,lg:54}[size]||42;
  const cols=['#F4674F','#16B981','#4DA3C4','#8E6FB0','#2480C4','#0C4775'];
  const init=name.split(' ').filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?';
  const bg=cols[[...name].reduce((a,c)=>a+c.charCodeAt(0),0)%cols.length];
  return <div style={{width:dim,height:dim,borderRadius:'50%',flexShrink:0,display:'inline-flex',
    alignItems:'center',justifyContent:'center',background:bg,color:'#fff',fontWeight:700,
    fontSize:dim*.38,userSelect:'none',boxShadow:'inset 0 0 0 2px rgba(255,255,255,.2)',...style}}>
    {init}
  </div>;
}

function StatTile({ icon, value, label, trend=null, caption, tone='navy' }) {
  // Count up numeric values (including "86%" style strings)
  const num = typeof value==='number' ? value
    : (typeof value==='string' && /^\d+%$/.test(value)) ? parseInt(value,10) : null;
  const counted = useCountUp(num===null?0:num);
  const display = num===null ? value : (typeof value==='string' ? counted+'%' : counted);
  const up = trend && trend.dir==='up';
  return (
    <div className="dash-card stat-card" style={{padding:'var(--space-5)',
      display:'flex',flexDirection:'column',gap:'var(--space-4)','--stat-glow':`var(--${tone}-100)`}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{width:42,height:42,borderRadius:'var(--radius-lg)',display:'inline-flex',
          alignItems:'center',justifyContent:'center',
          background:`var(--${tone}-100)`,color:`var(--${tone}-500)`}}>
          <Icon n={icon} size={19} />
        </span>
        {trend && (
          <span className="delta-chip" style={{
            color:up?'var(--success-500)':'var(--danger-500)',
            background:up?'var(--success-100)':'var(--danger-100)'}}>
            <Icon n={up?'arrow-up-right':'arrow-down-right'} size={12} /> {trend.value}
          </span>
        )}
      </div>
      <div>
        <div style={{fontSize:'var(--text-3xl)',fontWeight:800,color:'var(--text-strong)',
          letterSpacing:'-.025em',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{display}</div>
        <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)',marginTop:7,fontWeight:500}}>{label}</div>
        {caption && <div style={{fontSize:11,color:'var(--text-subtle)',marginTop:3,fontWeight:500}}>{caption}</div>}
      </div>
    </div>
  );
}

// ClassCard — design-system style: colored top band, title, age badge,
// teacher, and today's checked-in progress.
function ClassCard({ cls, count, present, onClick, onEdit }) {
  const tone = cls.tone || 'navy';
  const ratio = count ? present/count : 0;
  return (
    <div onClick={onClick} style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
      borderRadius:'var(--radius-lg)',overflow:'hidden',boxShadow:'var(--shadow-sm)',
      cursor:onClick?'pointer':'default',display:'flex',flexDirection:'column',
      transition:'transform 200ms ease,box-shadow 200ms ease'}}
      onMouseEnter={onClick?e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow='var(--shadow-lg)';}:undefined}
      onMouseLeave={onClick?e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='var(--shadow-sm)';}:undefined}>
      <div style={{height:6,background:`var(--${tone}-500)`}} />
      <div style={{padding:'var(--space-5)',display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:'var(--text-lg)',fontWeight:800,color:'var(--text-strong)',
              letterSpacing:'-.01em',overflow:'hidden',textOverflow:'ellipsis'}}>{className(cls)}</div>
            {cls.room && <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)',marginTop:2}}>{cls.room}</div>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
            <Badge tone={tone}>{cls.ageRange||'—'}</Badge>
            {onEdit && (
              <button onClick={e=>{e.stopPropagation();onEdit();}} aria-label="Edit class" style={{width:30,height:30,
                borderRadius:'50%',border:'none',background:'var(--navy-50)',color:'var(--navy-700)',
                cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon n="pencil" size={13} />
              </button>
            )}
          </div>
        </div>
        {(()=>{ const ts=classTeachers(cls); return (
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {ts.length ?
            <div style={{display:'flex',flexShrink:0}}>
              {ts.slice(0,3).map((t,i)=><Av key={i} name={t} size="sm" style={{marginLeft:i?-10:0,boxShadow:'inset 0 0 0 2px rgba(255,255,255,.25), 0 0 0 2px var(--surface-card)'}} />)}
            </div> :
            <span style={{width:34,height:34,borderRadius:'50%',background:'var(--surface-sunken)',flexShrink:0,
              display:'inline-flex',alignItems:'center',justifyContent:'center',color:'var(--text-subtle)'}}><Icon n="user-plus" size={15} /></span>}
          <div style={{fontSize:'var(--text-sm)',color:'var(--text-body)',minWidth:0}}>
            {ts.length ? <><span style={{color:'var(--text-subtle)'}}>{ts.length>1?'Teachers ':'Teacher '}</span>
              <span style={{fontWeight:600,color:'var(--text-strong)'}}>{ts.join(' & ')}</span></>
              : <span style={{color:'var(--text-subtle)',fontStyle:'italic'}}>No teacher set</span>}
          </div>
        </div>
        ); })()}
        <div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'var(--text-sm)',marginBottom:6}}>
            <span style={{color:'var(--text-muted)'}}>Checked in</span>
            <span style={{fontWeight:800,color:'var(--text-strong)',fontVariantNumeric:'tabular-nums'}}>{present} / {count}</span>
          </div>
          <div style={{height:8,borderRadius:'var(--radius-pill)',background:'var(--surface-sunken)',overflow:'hidden'}}>
            <div style={{width:(ratio*100)+'%',height:'100%',background:`var(--${tone}-500)`,
              borderRadius:'var(--radius-pill)',transition:'width 360ms ease'}} />
          </div>
        </div>
      </div>
    </div>
  );
}

function Input({ label, placeholder, value, onChange, type='text', iL, required, error, multi, rows=3, hint }) {
  const baseStyle = {
    width:'100%',fontFamily:'var(--font-sans)',fontSize:'var(--text-md)',
    padding:iL?'10px 12px 10px 42px':'10px 14px',
    borderRadius:'var(--radius-md)',border:`1.5px solid ${error?'var(--danger-500)':'var(--border-default)'}`,
    background:'var(--paper)',color:'var(--text-strong)',outline:'none',
    transition:'border-color 150ms ease',
  };
  return (
    <div>
      {label && <label style={{display:'block',fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)',marginBottom:6}}>
        {label}{required && <span style={{color:'var(--coral-500)',marginLeft:3}}>*</span>}
      </label>}
      <div style={{position:'relative'}}>
        {iL && <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',display:'flex',pointerEvents:'none'}}>{iL}</span>}
        {multi ? <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows}
          style={{...baseStyle,resize:'vertical'}}
          onFocus={e=>e.target.style.borderColor='var(--navy-600)'}
          onBlur={e=>e.target.style.borderColor=error?'var(--danger-500)':'var(--border-default)'} />
        : <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={baseStyle}
          onFocus={e=>e.target.style.borderColor='var(--navy-600)'}
          onBlur={e=>e.target.style.borderColor=error?'var(--danger-500)':'var(--border-default)'} />}
      </div>
      {error && <div style={{fontSize:'var(--text-xs)',color:'var(--danger-500)',marginTop:4}}>{error}</div>}
      {hint && !error && <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:4}}>{hint}</div>}
    </div>
  );
}

function Modal({ open, onClose, title, children, footer }) {
  useEffect(()=>{ document.body.style.overflow=open?'hidden':''; return()=>{document.body.style.overflow='';};}, [open]);
  if(!open) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(2,26,43,.55)',backdropFilter:'blur(4px)',
      display:'flex',alignItems:'flex-end',animation:'fadeIn 150ms ease'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:'100%',maxWidth:600,margin:'0 auto',background:'var(--paper)',
        borderRadius:'var(--radius-2xl) var(--radius-2xl) 0 0',maxHeight:'92dvh',
        overflow:'hidden',display:'flex',flexDirection:'column',animation:'slideUp 200ms cubic-bezier(0.22,1,0.36,1)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'var(--space-5)',borderBottom:'1px solid var(--border-soft)',flexShrink:0}}>
          <div style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-strong)'}}>{title}</div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:'50%',border:'none',
            background:'var(--surface-sunken)',cursor:'pointer',display:'flex',alignItems:'center',
            justifyContent:'center',color:'var(--text-muted)'}}>
            <Icon n="x" size={18} />
          </button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'var(--space-5)',WebkitOverflowScrolling:'touch'}}>
          {children}
        </div>
        {footer && <div style={{padding:'var(--space-4) var(--space-5)',borderTop:'1px solid var(--border-soft)',
          display:'flex',gap:'var(--space-3)',justifyContent:'flex-end',flexShrink:0,
          paddingBottom:'calc(var(--space-4) + env(safe-area-inset-bottom))'}}>
          {footer}
        </div>}
      </div>
    </div>
  );
}

function Toast({ toast }) {
  if(!toast) return null;
  return (
    <div key={toast.key} style={{position:'fixed',left:'50%',bottom:'calc(84px + env(safe-area-inset-bottom))',
      zIndex:300,transform:'translateX(-50%)',animation:'toastIn 240ms cubic-bezier(0.22,1,0.36,1)',
      background:'var(--navy-800)',color:'var(--cream-50)',borderRadius:'var(--radius-pill)',
      padding:'11px 20px',display:'flex',alignItems:'center',gap:9,boxShadow:'var(--shadow-lg)',
      fontSize:'var(--text-sm)',fontWeight:600,whiteSpace:'nowrap',maxWidth:'90vw'}}>
      <span style={{width:22,height:22,borderRadius:'50%',background:'var(--leaf-500)',flexShrink:0,
        display:'inline-flex',alignItems:'center',justifyContent:'center',animation:'popIn 320ms ease'}}>
        <Icon n={toast.icon||'check'} size={13} color="#fff" />
      </span>
      <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{toast.msg}</span>
    </div>
  );
}

/* ── DASHBOARD SECTIONS (shared by phone & desktop layouts) ── */
function SectionLabel({ children, action }) {
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase'}}>{children}</div>
      {action}
    </div>
  );
}

function ChecklistCard({ steps, onNav }) {
  return (
    <div style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
      borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-xs)',overflow:'hidden'}}>
      <div style={{padding:'var(--space-4) var(--space-4) 0'}}>
        <div style={{fontSize:'var(--text-md)',fontWeight:800,color:'var(--text-strong)'}}>Get set up</div>
        <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:2}}>
          {steps.filter(s=>s.done).length} of {steps.length} done
        </div>
      </div>
      <div style={{marginTop:'var(--space-3)'}}>
        {steps.map(st=>(
          <button key={st.label} onClick={()=>!st.done&&onNav(st.go)} disabled={st.done}
            style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 16px',
              border:'none',borderTop:'1px solid var(--border-soft)',
              background:st.done?'var(--surface-sunken)':'transparent',
              cursor:st.done?'default':'pointer',textAlign:'left',fontFamily:'var(--font-sans)'}}>
            <span style={{width:30,height:30,borderRadius:'50%',flexShrink:0,display:'flex',
              alignItems:'center',justifyContent:'center',
              background:st.done?'var(--leaf-500)':'var(--navy-50)',
              color:st.done?'#fff':'var(--navy-600)'}}>
              <Icon n={st.done?'check':st.icon} size={15} />
            </span>
            <span style={{flex:1,minWidth:0}}>
              <span style={{display:'block',fontWeight:600,fontSize:'var(--text-sm)',
                color:st.done?'var(--text-muted)':'var(--text-strong)',
                textDecoration:st.done?'line-through':'none'}}>{st.label}</span>
              {!st.done&&<span style={{display:'block',fontSize:11,color:'var(--text-muted)',marginTop:1}}>{st.sub}</span>}
            </span>
            {!st.done&&<Icon n="chevron-right" size={16} color="var(--text-subtle)" />}
          </button>
        ))}
      </div>
    </div>
  );
}

function ClassesOverview({ classes, students, todayAtt, onOpenClass, onNav, columns }) {
  return (

// Animated SVG donut with a center label. segments: [{value,color}]
function Donut({ segments, size=150, thickness=18, center, sub }) {
  const total=segments.reduce((a,s)=>a+s.value,0)||1;
  const r=(size-thickness)/2, C=2*Math.PI*r; let off=0;
  return (
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface-sunken)" strokeWidth={thickness} />
        {segments.filter(s=>s.value>0).map((s,i)=>{
          const len=(s.value/total)*C; const el=(
            <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={thickness}
              strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-off} strokeLinecap="butt"
              style={{animation:`donutGrow 700ms ${i*120}ms cubic-bezier(0.22,1,0.36,1) both`}} />);
          off+=len; return el;
        })}
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center'}}>
        <div style={{fontSize:'var(--text-2xl)',fontWeight:800,color:'var(--text-strong)',lineHeight:1,letterSpacing:'-.02em'}}>{center}</div>
        {sub && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4,fontWeight:600}}>{sub}</div>}
      </div>
    </div>
  );
}

// Radial "attendance vs goal" gauge — 270° arc with a goal marker tick.
// onDark renders cream/navy-tinted strokes for use on the hero banner.
function RadialGauge({ value, goal=85, size=140, onDark=false, center, label }) {
  const has = value!==null && value!==undefined && !Number.isNaN(value);
  const v = Math.max(0,Math.min(100,Math.round(has?value:0)));
  const stroke = Math.max(10,Math.round(size*0.10));
  const r = (size-stroke)/2 - 2;
  const cx=size/2, cy=size/2;
  const sweep=270, start=135, C=2*Math.PI*r, arc=C*sweep/360, val=arc*(v/100);
  const reached = has && v>=goal;
  const track = onDark?'rgba(255,255,255,.13)':'var(--surface-sunken)';
  const col = !has ? (onDark?'rgba(255,255,255,.28)':'var(--ink-300)')
    : reached ? (onDark?'#54E0A0':'var(--leaf-500)') : (onDark?'#4FB4F2':'var(--navy-500)');
  const glow = !has?'transparent':reached?(onDark?'rgba(84,224,160,.55)':'rgba(22,185,129,.40)')
    :(onDark?'rgba(79,180,242,.55)':'rgba(36,128,196,.30)');
  // goal marker — a clean rounded bead sitting on the track centreline
  const ga = (start + goal/100*sweep) * Math.PI/180;
  const gx=cx+Math.cos(ga)*r, gy=cy+Math.sin(ga)*r;
  const centerTxt = center!==undefined ? center : (has?v+'%':'—');
  const sub = label!==undefined ? label : (!has?'no data':reached?'goal met ✓':'of '+goal+'% goal');
  const gid='gg'+Math.round(size);
  return (
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <g transform={`rotate(${start} ${cx} ${cy})`}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={track} strokeWidth={stroke}
            strokeDasharray={`${arc} ${C}`} strokeLinecap="round" />
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={col} strokeWidth={stroke}
            strokeDasharray={`${val} ${C}`} strokeLinecap="round"
            style={{animation:'donutGrow 900ms cubic-bezier(0.22,1,0.36,1) both',
              filter:`drop-shadow(0 0 ${Math.round(size*0.05)}px ${glow})`}} />
        </g>
        {has && (<>
          <circle cx={gx} cy={gy} r={stroke*0.28} fill={onDark?'#fff':'var(--surface-card)'}
            stroke={onDark?'rgba(0,0,0,.18)':'var(--border-default)'} strokeWidth="1.25" />
        </>)}
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center'}}>
        <div style={{fontSize:size*0.28,fontWeight:800,lineHeight:1,letterSpacing:'-.03em',fontVariantNumeric:'tabular-nums',
          color:onDark?'#fff':'var(--text-strong)'}}>{centerTxt}</div>
        <div style={{fontSize:Math.max(9.5,size*0.078),marginTop:size*0.03,fontWeight:600,letterSpacing:'.01em',
          color:onDark?'rgba(208,230,245,.9)':'var(--text-muted)'}}>{sub}</div>
      </div>
    </div>
  );
}

// Compact attendance sparkline from per-Sunday history ('p'/'a'/'u').
function Sparkline({ hist, w=140, h=46 }) {
  if(!hist||!hist.length) return null;
  const pad=8, n=hist.length;
  const xOf=i=>pad+(w-2*pad)*(n<=1?0.5:i/(n-1));
  const yOf=m=>m==='p'?pad:m==='a'?h-pad:h/2;
  const pts=hist.map((it,i)=>({x:xOf(i),y:yOf(it.mark),m:it.mark}));
  const line=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const area=`${line} L${pts[n-1].x.toFixed(1)} ${h-pad} L${pts[0].x.toFixed(1)} ${h-pad} Z`;
  const col={p:'var(--leaf-500)',a:'var(--coral-500)',u:'var(--ink-300)'};
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block',maxWidth:'100%'}}>
      <defs><linearGradient id="spkGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor="var(--navy-500)" stopOpacity=".22" />
        <stop offset="1" stopColor="var(--navy-500)" stopOpacity="0" />
      </linearGradient></defs>
      <path d={area} fill="url(#spkGrad)" />
      <path d={line} fill="none" stroke="var(--navy-600)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={p.m==='u'?2:3.2} fill={col[p.m]}
        stroke="var(--surface-card)" strokeWidth="1.5" />)}
    </svg>
  );
}

        {extra>0 && (
          <button onClick={()=>onNav&&onNav('students')} style={{background:'none',border:'none',cursor:'pointer',
            fontSize:11,fontWeight:600,color:'var(--link)',textAlign:'left',padding:0,fontFamily:'var(--font-sans)'}}>

          {t('Celebrate their faithfulness this Sunday.')} 🎉

  );
}

/* ── DASHBOARD ── */
function Dashboard({ students, attendance, sessions, classes=[], onNav, onReset, onOpenClass, onSearch,
  cloud, cloudApi, lang, setLanguage, t=s=>s, teacher='', setTeacher, onOpenSettings, onOpenGuide }) {
  const realToday = dk(new Date());           // the actual calendar date
  const today = dk(currentSunday());           // the class day (nearest Sunday; upcoming once past midweek)
  const isSunday = realToday===today;
  const isUpcoming = today>realToday;          // class Sunday is still ahead of us
  const todayAtt = attendance[today]||{};
  const present = students.filter(s=>todayAtt[s.id]===true).length;
  const marked = Object.keys(todayAtt).length;
  const alerts = students.filter(s=>absenceStreak(s.id,attendance)>=3);
  const upcoming = [...sessions].sort((a,b)=>a.date.localeCompare(b.date)).find(s=>s.date>=today);
  const recentKeys = Object.keys(attendance).sort().reverse().slice(0,4);

  // Recorded Sundays (with data), most-recent first
  const recordedKeys = Object.keys(attendance).filter(k=>Object.keys(attendance[k]).length>0).sort().reverse();
  const prevKey = recordedKeys.find(k=>k!==today);
  const presentOf = k => Object.values(attendance[k]||{}).filter(Boolean).length;
  const rateOf = k => { const r=attendance[k]||{}; const t=Object.keys(r).length; return t?Math.round(Object.values(r).filter(Boolean).length/t*100):0; };

  // Week-over-week trend for "Present today"
  let presentTrend = null;
  if(marked>0 && prevKey){
    const diff = present - presentOf(prevKey);
    if(diff!==0) presentTrend = { dir: diff>0?'up':'down', value: Math.abs(diff) };
  }
  // Trend for attendance rate (today vs previous recorded Sunday)
  const rateToday = marked>0 ? rateOf(today) : (prevKey?rateOf(prevKey):null);
  let rateTrend = null;
  if(marked>0 && prevKey){
    const diff = rateOf(today) - rateOf(prevKey);
    if(diff!==0) rateTrend = { dir: diff>0?'up':'down', value: Math.abs(diff)+'%' };
  }

  // Onboarding checklist — each step disappears once done
  const hasPhones = students.some(s=>s.parentPhone);
  const steps = [
    { done: recordedKeys.length>0, label:'Take your first attendance', sub:'Mark who came this Sunday', icon:'check-circle-2', go:'attendance' },
    { done: hasPhones, label:'Add parent phone numbers', sub:'So you can follow up on absences', icon:'phone', go:'students' },
    { done: sessions.length>0, label:'Plan a lesson', sub:'Outline this week’s session', icon:'book-open', go:'sessions' },
  ];
  const showChecklist = students.length>0 && steps.some(s=>!s.done);

  // Upcoming birthdays (next 14 days) and flagged first-time visitors
  const birthdays = students.map(s=>({s,b:nextBirthdayInfo(s.birthday)}))
    .filter(x=>x.b&&x.b.days<=14).sort((a,b)=>a.b.days-b.b.days).slice(0,6);
  const visitors = students.filter(s=>s.visitor).slice(0,6);

  // Faithfulness — children present on EVERY recorded Sunday (never missed, never
  // unmarked). Only shown once there are 4+ recorded Sundays so it means something.
  const perfectKids = recordedKeys.length>=4
    ? students.filter(s=>recordedKeys.every(k=>attendance[k][s.id]===true))
              .sort((a,b)=>a.name.localeCompare(b.name,'am'))
    : [];

  // "vs last Sunday" caption shown on the trend stat tiles
  const vsCaption = (marked>0 && prevKey) ? t('vs last Sunday') : null;

  const isDesk = useMedia('(min-width:1024px)');
  const hour = new Date().getHours();
  const greeting = t(hour<12?'Good morning':hour<18?'Good afternoon':'Good evening');
  const subtitle = marked>0
    ? `${present} checked in ${isSunday?'today':'on '+fmtShort(today)}`
    : (isSunday?'No attendance yet today':isUpcoming?`Sunday ${fmtShort(today)} coming up`:`Sunday ${fmtShort(today)} not recorded yet`);

  // Donut (this class-day) + per-class attendance leaderboard over recent Sundays
  const dAbsent = students.filter(s=>todayAtt[s.id]===false).length;
  const dUnmarked = Math.max(0, students.length - present - dAbsent);
  const donutDate = isSunday?'today':fmtShort(today);
  const classStats = classes.map(c=>{
    const ids=students.filter(s=>s.classId===c.id).map(s=>s.id);
    let pres=0, mk=0;
    recordedKeys.slice(0,8).forEach(k=>{ const r=attendance[k]||{}; ids.forEach(id=>{ if(id in r){ mk++; if(r[id]===true) pres++; } }); });
    return { c, count:ids.length, rate: mk?Math.round(pres/mk*100):null };
  }).sort((a,b)=>(b.rate??-1)-(a.rate??-1));
  const hasClassData = classStats.some(c=>c.rate!==null);

  /* ── Desktop dashboard ── */
  if(isDesk) return (
    <div className="page" style={{maxWidth:1320,margin:'0 auto',padding:'28px 36px 44px',
      display:'flex',flexDirection:'column',gap:'var(--space-5)'}}>

      {/* Header row */}
      <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:'var(--text-3xl)',fontWeight:800,color:'var(--text-strong)',letterSpacing:'-.02em',lineHeight:1.1}}>{greeting}</h1>
          <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)',marginTop:5}}>{fmtFull(realToday)} · {students.length} students · {subtitle}</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center'}}>
          {cloud&&cloud.status!=='off'&&(
            <button onClick={onOpenSettings} title={cloud.status==='synced'?'Team sync on':'Sync needs attention'}
              style={{display:'flex',alignItems:'center',gap:6,padding:'8px 13px',borderRadius:'var(--radius-pill)',
                border:'1px solid var(--border-default)',cursor:'pointer',fontFamily:'var(--font-sans)',
                fontSize:11,fontWeight:700,
                background:cloud.status==='synced'?'var(--leaf-100)':cloud.status==='error'?'var(--danger-100)':'var(--surface-card)',
                color:cloud.status==='synced'?'#0E7B55':cloud.status==='error'?'#A93B33':'var(--text-muted)'}}>
              <Icon n="cloud" size={14} />
              {cloud.status==='synced'?'Synced':cloud.status==='syncing'?'Syncing…':cloud.status==='error'?'Error':'Sign in'}
            </button>
          )}
          <Btn variant="primary" size="sm" iL={<Icon n="check-circle-2" size={15} />} onClick={()=>onNav('attendance')}>{t('Take attendance')}</Btn>
        </div>
      </div>

      {/* Stats — 4 across */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'var(--space-4)'}}>
        <StatTile icon="users" value={students.length} label="Students enrolled" tone="navy" />
        <StatTile icon="check-circle-2" value={marked>0?present:'—'} label={isSunday?'Present today':`Present ${fmtShort(today)}`} tone="leaf" trend={presentTrend} caption={presentTrend?vsCaption:null} />
        <StatTile icon="percent" value={rateToday!==null?rateToday+'%':'—'} label={marked>0?(isSunday?'Attendance today':'Attendance '+fmtShort(today)):'Last attendance'} tone="sky" trend={rateTrend} caption={rateTrend?vsCaption:null} />
        <StatTile icon="bell-ring" value={alerts.length} label="Need follow-up" tone={alerts.length?'coral':'grape'} />
      </div>

      {/* Featured row: Sunday CTA card + attendance donut */}
      <div style={{display:'grid',gridTemplateColumns:(marked>0||students.length>0)?'1.05fr 1fr':'1fr',gap:'var(--space-4)',alignItems:'stretch'}}>
        <div className="hero-gradient" style={{borderRadius:'var(--radius-2xl)',padding:'var(--space-7)',
          color:'var(--cream-50)',position:'relative',overflow:'hidden',display:'flex',alignItems:'center',gap:'var(--space-7)',minHeight:218}}>
          <Logo color="var(--cream-50)" size={300} style={{position:'absolute',left:-90,bottom:-90,opacity:.04,pointerEvents:'none'}} />
          <div style={{position:'relative',flex:1,minWidth:0}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--navy-100)'}}>
              {isSunday?'This Sunday':isUpcoming?'Upcoming · Sunday':'Class day · Sunday'}
            </div>
            <div style={{fontSize:'var(--text-2xl)',fontWeight:800,letterSpacing:'-.02em',marginTop:8,lineHeight:1.15}}>
              {fmtFull(today)}
            </div>
            <p style={{fontSize:'var(--text-sm)',color:'var(--navy-100)',marginTop:8,maxWidth:'46ch',lineHeight:1.55}}>
              {marked>0?`${present} of ${students.length} children checked in. Keep it up!`
                :isUpcoming?'Coming up — plan your lesson now, and check the children in on the day.'
                :'Attendance has not been recorded for this Sunday yet — it takes about a minute.'}
            </p>
            <div style={{display:'flex',gap:10,marginTop:18}}>
              <Btn variant="accent" size="sm" iL={<Icon n="check-circle-2" size={15} />} onClick={()=>onNav('attendance')}>
                {marked>0?'Review attendance':'Take attendance'}
              </Btn>
              <Btn variant="ghost" size="sm" onClick={()=>onNav('sessions')}
                style={{color:'var(--cream-50)',borderColor:'rgba(251,247,240,.3)'}}>Plan a lesson</Btn>
            </div>
          </div>
          {rateToday!==null && (
            <div style={{position:'relative',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
              <div className="gauge-orb" style={{padding:13}}>
                <RadialGauge value={rateToday} goal={85} size={150} onDark />
              </div>
              <div style={{fontSize:10.5,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(208,230,245,.85)'}}>
                {marked>0?(isSunday?'Today':fmtShort(today)):'Last Sunday'}
              </div>
            </div>
          )}
        </div>
        {students.length>0 && <AttendanceDonutCard present={present} absent={dAbsent} unmarked={dUnmarked} total={students.length} dateLabel={donutDate} onNav={onNav} />}
      </div>

      {/* Insight row: class leaderboard + interactive trend */}
      {(hasClassData || recordedKeys.length>=2) && (
        <div style={{display:'grid',gridTemplateColumns:hasClassData&&recordedKeys.length>=2?'1fr 1fr':'1fr',gap:'var(--space-4)',alignItems:'stretch'}}>
          {hasClassData && <ClassLeaderboardCard classStats={classStats} onOpenClass={onOpenClass} />}
          {recordedKeys.length>=2 && <TrendCard recordedKeys={recordedKeys} rateOf={rateOf} attendance={attendance} height={150} fill />}
        </div>
      )}

      {/* Main: classes + right rail */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 350px',gap:'var(--space-4)',alignItems:'start'}}>
        <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
          {classes.length>0 && students.length>0 &&
            <ClassesOverview classes={classes} students={students} todayAtt={todayAtt}
              onOpenClass={onOpenClass} onNav={onNav} columns="repeat(2,1fr)" />}
          {students.length===0 && (
            <div style={{textAlign:'center',padding:'var(--space-7) var(--space-5)'}}>
              <div style={{fontWeight:700,fontSize:'var(--text-lg)',color:'var(--text-strong)'}}>Add your first student</div>
              <Btn variant="primary" onClick={()=>onNav('students')} style={{marginTop:16}} iL={<Icon n="user-plus" size={16} />}>Add students</Btn>
            </div>
          )}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
          {showChecklist && <ChecklistCard steps={steps} onNav={onNav} />}
          {alerts.length>0 && <AlertsCard alerts={alerts} attendance={attendance} onNav={onNav} />}
          {perfectKids.length>0 && <StreaksCard list={perfectKids} sundays={recordedKeys.length} onNav={onNav} t={t} />}
          {birthdays.length>0 && <BirthdaysCard list={birthdays} t={t} />}
          {visitors.length>0 && <VisitorsCard list={visitors} attendance={attendance} onNav={onNav} t={t} />}
          {upcoming && <NextSessionCard upcoming={upcoming} />}
          {recentKeys.length>0 && <RecentCard recentKeys={recentKeys} attendance={attendance} onNav={onNav} />}
        </div>
      </div>

    </div>
  );

  /* ── Phone dashboard ── */
  return (
    <div className="page" style={{maxWidth:680,margin:'0 auto'}}>
      {/* Hero banner */}
      <div className="hero-gradient" style={{borderRadius:'0 0 var(--radius-2xl) var(--radius-2xl)',
        padding:'var(--space-6) var(--space-5)',color:'var(--cream-50)',position:'relative',overflow:'hidden'}}>
        <Logo color="var(--cream-50)" size={230} style={{position:'absolute',left:-70,bottom:-80,opacity:.04,pointerEvents:'none'}} />
        <div style={{position:'relative'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:'var(--space-5)'}}>
            <Logo color="var(--cream-50)" size={34} />
            <div style={{lineHeight:1.1}}>
              <div style={{color:'var(--cream-50)',fontWeight:800,fontSize:'var(--text-md)'}}>FECMY</div>
              <div style={{color:'var(--navy-300)',fontSize:11,fontWeight:600}}>Children Ministry</div>
            </div>
            <button onClick={onOpenGuide} aria-label={t('Guide')} title={t('Guide')} style={{marginLeft:'auto',
              width:38,height:38,borderRadius:'50%',border:'1px solid rgba(251,247,240,.2)',
              background:'rgba(251,247,240,.08)',color:'var(--cream-50)',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon n="help-circle" size={18} />
            </button>
            <button onClick={onOpenSettings} aria-label="Settings" style={{
              width:38,height:38,borderRadius:'50%',border:'1px solid rgba(251,247,240,.2)',
              background:'rgba(251,247,240,.08)',color:'var(--cream-50)',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon n="settings" size={18} />
            </button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--navy-100)'}}>
                {fmtFull(realToday)}
              </div>
              <h1 style={{fontSize:'var(--text-2xl)',fontWeight:800,marginTop:6,letterSpacing:'-.02em',lineHeight:1.15}}>
                {greeting}
              </h1>
              <p style={{fontSize:'var(--text-sm)',color:'var(--navy-100)',marginTop:4,lineHeight:1.5}}>

            </div>
            {rateToday!==null && <div className="gauge-orb" style={{padding:9}}><RadialGauge value={rateToday} goal={85} size={100} onDark /></div>}
          </div>

              style={{flex:1}}>
              {t('Take attendance')}

            <Btn variant="ghost" size="sm" onClick={()=>onNav('students')}

          <StatTile icon="check-circle-2" value={marked>0?present:'—'} label={isSunday?'Present today':'Present'} tone="leaf"

          <StatTile icon="percent" value={rateToday!==null?rateToday+'%':'—'} label="Attendance" tone="sky"

        {birthdays.length>0 && <BirthdaysCard list={birthdays} t={t} />}

        {visitors.length>0 && <VisitorsCard list={visitors} attendance={attendance} onNav={onNav} t={t} />}

        {upcoming && <NextSessionCard upcoming={upcoming} />}

        {recordedKeys.length>=2 && <TrendCard recordedKeys={recordedKeys} rateOf={rateOf} attendance={attendance} />}

// Cloud sync panel inside Settings — connect → sign in → synced.
function CloudSection({ cloud, api }) {
  const [url,setUrl]=useState('');
  const [key,setKey]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);
  const [invCopied,setInvCopied]=useState(false);
  const run=async fn=>{ setBusy(true); setMsg(null);
    try{ await fn(); }catch(e){ setMsg(e.message||String(e)); } setBusy(false); };
  const copyInvite=()=>{
    const c=cloudCfg();
    if(!c){ setMsg('Connect first'); return; }
    if(!/^http/.test(location.protocol)){ setMsg('Invite links work once the app is online (e.g. GitHub Pages)'); return; }
    const link=location.origin+location.pathname+'#join='+encodeURIComponent(btoa(c.url+'|'+c.key));
    try{ navigator.clipboard.writeText(link); setInvCopied(true); setTimeout(()=>setInvCopied(false),2200); }
    catch{ setMsg('Could not copy — send your co-teachers the URL and key instead'); }
  };
  const inp={width:'100%',padding:'10px 12px',borderRadius:'var(--radius-md)',border:'1.5px solid var(--border-default)',
    background:'var(--paper)',fontFamily:'var(--font-sans)',fontSize:'var(--text-sm)',color:'var(--text-strong)',outline:'none'};
  const statusChip={
    off:{bg:'var(--ink-100)',fg:'var(--ink-700)',label:'Local only'},
    connecting:{bg:'var(--sky-100)',fg:'#286179',label:'Connecting…'},
    signedout:{bg:'var(--warning-100)',fg:'#9A6A12',label:'Sign in needed'},
    syncing:{bg:'var(--sky-100)',fg:'#286179',label:'Syncing…'},
    synced:{bg:'var(--leaf-100)',fg:'#0E7B55',label:'Synced'},
    error:{bg:'var(--danger-100)',fg:'#A93B33',label:'Sync error'},
  }[cloud.status]||{bg:'var(--ink-100)',fg:'var(--ink-700)',label:cloud.status};

  return (
    <div style={{borderTop:'1px solid var(--border-soft)',paddingTop:'var(--space-4)'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <Icon n="cloud" size={17} color="var(--navy-700)" />
        <span style={{fontSize:'var(--text-sm)',fontWeight:700,color:'var(--text-strong)'}}>Team sync</span>
        <span style={{marginLeft:'auto',fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:'var(--radius-pill)',
          background:statusChip.bg,color:statusChip.fg}}>{statusChip.label}</span>
      </div>

      {cloud.status==='off' && (
        <div>
          <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',lineHeight:1.55,marginBottom:10}}>
            Share one live database with your co-teachers — everyone sees the same students and attendance.
            Got an <b>invite link</b> from your coordinator? Just open it — this screen switches to sign-in
            by itself. Setting up a new team? Your coordinator has the setup instructions.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <input style={inp} placeholder="Project URL — https://xxxx.supabase.co" value={url} onChange={e=>setUrl(e.target.value)} />
            <input style={inp} placeholder="anon public key — eyJhbGciOi…" value={key} onChange={e=>setKey(e.target.value)} />
            <Btn variant="primary" size="sm" disabled={busy||!url.trim()||!key.trim()}
              iL={<Icon n="cloud" size={15} />} onClick={()=>run(async()=>api.connect(url,key))}>Connect</Btn>
          </div>
        </div>
      )}

      {cloud.status==='signedout' && (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>
            Connected to the project — sign in with your teacher account.
          </div>
          <input style={inp} type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} />
          <input style={inp} type="password" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} />
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <Btn variant="primary" size="sm" disabled={busy||!email.trim()||!pw}
              onClick={()=>run(()=>api.signIn(email.trim(),pw))}>{busy?'…':'Sign in'}</Btn>
            <Btn variant="secondary" size="sm" disabled={busy||!email.trim()||pw.length<6}
              onClick={()=>run(()=>api.signUp(email.trim(),pw))}>Create account</Btn>
            <Btn variant="ghost" size="sm" style={{color:'var(--danger-500)',marginLeft:'auto'}}
              onClick={api.disconnect}>Disconnect</Btn>
          </div>
          <div style={{fontSize:10,color:'var(--text-subtle)',lineHeight:1.5}}>
            Password must be 6+ characters for new accounts. If “Create account” is rejected, sign-ups are
            (correctly) locked — ask your coordinator to add your account in Supabase.
          </div>
        </div>
      )}

      {(cloud.status==='synced'||cloud.status==='syncing'||cloud.status==='error'||cloud.status==='connecting') && cloud.user && (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>
            Signed in as <b style={{color:'var(--text-strong)'}}>{cloud.user}</b>
            {cloud.last&&<> · last sync {cloud.last.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</>}
          </div>
          {cloud.status==='error'&&<div style={{fontSize:'var(--text-xs)',color:'var(--danger-500)',lineHeight:1.5}}>{cloud.err}</div>}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <Btn variant="primary" size="sm" iL={<Icon n="copy" size={14} />} onClick={copyInvite}>
              {invCopied?'Link copied!':'Copy invite link'}
            </Btn>
            <Btn variant="secondary" size="sm" disabled={busy||cloud.status==='syncing'}
              iL={<Icon n="refresh" size={14} />} onClick={()=>run(api.syncNow)}>Sync now</Btn>
            <Btn variant="ghost" size="sm" iL={<Icon n="log-out" size={14} />} onClick={api.signOut}>Sign out</Btn>
            <Btn variant="ghost" size="sm" style={{color:'var(--danger-500)',marginLeft:'auto'}}
              onClick={api.disconnect}>Disconnect</Btn>
          </div>
          <div style={{fontSize:10,color:'var(--text-subtle)',lineHeight:1.5}}>
            Send the invite link to co-teachers (Telegram/WhatsApp) — opening it sets up their phone automatically; they only sign in with their own email + password.
          </div>
        </div>
      )}

      {(cloud.status==='error'||cloud.status==='connecting')&&!cloud.user&&(
        <div style={{fontSize:'var(--text-xs)',color:cloud.status==='error'?'var(--danger-500)':'var(--text-muted)',lineHeight:1.5}}>
          {cloud.err||'Connecting…'} — check your internet and reload, or
          <button onClick={api.disconnect} style={{background:'none',border:'none',cursor:'pointer',padding:'0 0 0 4px',
            fontFamily:'var(--font-sans)',fontSize:'inherit',fontWeight:700,color:'var(--danger-500)'}}>disconnect</button>.
        </div>
      )}
      {msg&&<div style={{fontSize:'var(--text-xs)',color:'var(--danger-500)',marginTop:8,lineHeight:1.5}}>{msg}</div>}
    </div>
  );
}

function SettingsSheet({ open, onClose, onReset, students, attendance, sessions, cloud, cloudApi, lang, setLanguage, t=s=>s, teacher='', setTeacher, theme='light', onToggleTheme, onOpenGuide }) {
  const [confirm,setConfirm]=useState(false);
  const fileRef=useRef(null);
  const [restoreErr,setRestoreErr]=useState(null);
  useEffect(()=>{ if(!open){ setConfirm(false); setRestoreErr(null); } },[open]);
  const recorded=Object.keys(attendance).filter(k=>Object.keys(attendance[k]).length>0).length;

  const onFile=e=>{
    const f=e.target.files&&e.target.files[0];
    if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ try{ cloudApi.restore(JSON.parse(r.result)); setRestoreErr(null); }
      catch(err){ setRestoreErr(err.message||'Could not read that file'); } };
    r.readAsText(f);
    e.target.value='';
  };

  const exportCsv=()=>{
    const dates=Object.keys(attendance).filter(k=>Object.keys(attendance[k]).length>0).sort();
    const head=['Name','Phone',...dates.map(fmtShort)].join(',');
    const rows=[...students].sort(byName).map(s=>{
      const cells=dates.map(d=>attendance[d][s.id]===true?'P':attendance[d][s.id]===false?'A':'');
      return ['"'+s.name+'"','"'+(s.parentPhone||'')+'"',...cells].join(',');
    });
    const csv=[head,...rows].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='fecmy-attendance.csv'; a.click();
  };

  return (
    <Modal open={open} onClose={onClose} title="Settings"
      footer={<Btn variant="ghost" size="sm" onClick={onClose}>Done</Btn>}>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <div style={{background:'var(--surface-sunken)',borderRadius:'var(--radius-md)',padding:'var(--space-4)'}}>
          <div style={{fontSize:'var(--text-sm)',fontWeight:700,color:'var(--text-strong)',marginBottom:8}}>This device holds</div>
          <div style={{display:'flex',gap:20}}>
            {[[students.length,'students'],[recorded,'Sundays recorded'],[sessions.length,'sessions']].map(([n,l])=>(
              <div key={l}>
                <div style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-brand)',lineHeight:1}}>{n}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Teacher name — stamps lesson plans with who planned/edited */}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Av name={teacher||'?'} size="sm" />
          <div style={{flex:1,minWidth:0}}>
            <input value={teacher} onChange={e=>setTeacher&&setTeacher(e.target.value)} placeholder="Your name (e.g. Shalom)"
              style={{width:'100%',padding:'9px 12px',borderRadius:'var(--radius-md)',border:'1.5px solid var(--border-default)',
                background:'var(--paper)',fontFamily:'var(--font-sans)',fontSize:'var(--text-sm)',color:'var(--text-strong)',outline:'none'}}
              onFocus={e=>e.target.style.borderColor='var(--navy-600)'}
              onBlur={e=>e.target.style.borderColor='var(--border-default)'} />
            <div style={{fontSize:10,color:'var(--text-subtle)',marginTop:4}}>Shown on lesson plans you create or edit, so the team knows who added what.</div>
          </div>
        </div>

        {/* Appearance */}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Icon n={theme==='dark'?'moon':'sun'} size={17} color="var(--text-brand)" />
          <span style={{fontSize:'var(--text-sm)',fontWeight:700,color:'var(--text-strong)',flex:1}}>Appearance</span>
          <div style={{display:'flex',background:'var(--surface-sunken)',borderRadius:'var(--radius-pill)',padding:3}}>
            {[['light','sun','Light'],['dark','moon','Dark']].map(([id,ic,label])=>(
              <button key={id} onClick={()=>onToggleTheme&&onToggleTheme(id)} style={{
                display:'flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:'var(--radius-pill)',border:'none',cursor:'pointer',
                fontFamily:'var(--font-sans)',fontSize:'var(--text-xs)',fontWeight:700,
                background:theme===id?'var(--navy-800)':'transparent',
                color:theme===id?'var(--cream-50)':'var(--text-muted)',transition:'background 150ms,color 150ms'}}>
                <Icon n={ic} size={14} />{label}
              </button>
            ))}
          </div>
        </div>

        {/* Language */}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Icon n="globe" size={17} color="var(--text-brand)" />
          <span style={{fontSize:'var(--text-sm)',fontWeight:700,color:'var(--text-strong)',flex:1}}>Language / ቋንቋ</span>
          <div style={{display:'flex',background:'var(--surface-sunken)',borderRadius:'var(--radius-pill)',padding:3}}>
            {[['en','English'],['am','አማርኛ']].map(([id,label])=>(
              <button key={id} onClick={()=>setLanguage(id)} style={{
                padding:'6px 14px',borderRadius:'var(--radius-pill)',border:'none',cursor:'pointer',
                fontFamily:id==='am'?'var(--font-amharic, var(--font-sans))':'var(--font-sans)',
                fontSize:'var(--text-xs)',fontWeight:700,
                background:lang===id?'var(--navy-800)':'transparent',
                color:lang===id?'var(--cream-50)':'var(--text-muted)',
                transition:'background 150ms ease,color 150ms ease'}}>{label}</button>
            ))}
          </div>
        </div>

        {/* Guided tour */}
        <Btn variant="secondary" full iL={<Icon n="compass" size={16} />} onClick={onOpenGuide}>{t('Replay guided tour')}</Btn>

        {/* Cloud sync */}
        <CloudSection cloud={cloud} api={cloudApi} />

        {/* Backup / restore / CSV */}
        <div style={{borderTop:'1px solid var(--border-soft)',paddingTop:'var(--space-4)',display:'flex',flexDirection:'column',gap:8}}>
          <div style={{fontSize:'var(--text-sm)',fontWeight:700,color:'var(--text-strong)'}}>Your data</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <Btn variant="secondary" size="sm" iL={<Icon n="download" size={15} />} onClick={cloudApi.backup}>Backup</Btn>
            <Btn variant="secondary" size="sm" iL={<Icon n="upload" size={15} />} onClick={()=>fileRef.current&&fileRef.current.click()}>Restore</Btn>
          </div>
          <input ref={fileRef} type="file" accept=".json,application/json" onChange={onFile} style={{display:'none'}} />
          {restoreErr&&<div style={{fontSize:'var(--text-xs)',color:'var(--danger-500)'}}>{restoreErr}</div>}
          <Btn variant="ghost" size="sm" iL={<Icon n="download" size={15} />} onClick={exportCsv}
            style={{justifyContent:'flex-start',paddingLeft:0}}>Export attendance (CSV)</Btn>
          <div style={{fontSize:10,color:'var(--text-subtle)',lineHeight:1.5}}>
            Backup saves everything (students, classes, attendance, sessions) to a file — keep one before clearing your browser or switching phones. Restore replaces this device's data with the file.
          </div>
        </div>

        <div style={{borderTop:'1px solid var(--border-soft)',paddingTop:'var(--space-4)'}}>
          <div style={{fontSize:'var(--text-sm)',fontWeight:700,color:'var(--text-strong)'}}>Start fresh</div>
          <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:4,lineHeight:1.5}}>
            Clears all attendance and sessions and restores the original 49-student roster. This cannot be undone — download a Backup first. If team sync is on, the fresh state syncs to your whole team.
          </div>
          {!confirm ? (
            <Btn variant="ghost" size="sm" style={{color:'var(--danger-500)',marginTop:10,paddingLeft:0}}
              iL={<Icon n="refresh" size={15} />} onClick={()=>setConfirm(true)}>Reset everything</Btn>
          ) : (
            <div style={{display:'flex',gap:8,marginTop:10,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontSize:'var(--text-sm)',color:'var(--danger-500)',fontWeight:600}}>Erase all data?</span>
              <Btn variant="danger" size="sm" onClick={onReset}>Yes, start fresh</Btn>
              <Btn variant="ghost" size="sm" onClick={()=>setConfirm(false)}>Cancel</Btn>
            </div>
          )}
        </div>
      </div>
    </Modal>
  );
}

/* ── STUDENTS ── */
function Students({ students, classes, attendance, onAdd, onEdit, onDelete, seed, t=s=>s }) {
  const [q,setQ]=useState('');
  const [classFilter,setClassFilter]=useState('all');
  const [editId,setEditId]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [viewId,setViewId]=useState(null);
  const isDesk=useMedia('(min-width:1024px)');
  // Global search (desktop header) seeds the query when it changes
  useEffect(()=>{ if(seed&&seed.q!==undefined) setQ(seed.q); },[seed&&seed.n]);
  const clsOf=id=>classes.find(c=>c.id===id);
  const filtered=students.filter(s=>
    (classFilter==='all'||s.classId===classFilter) &&
    (s.name.toLowerCase().includes(q.toLowerCase())||(s.parentName||'').toLowerCase().includes(q.toLowerCase())))
    .sort(byName);
  const editing=students.find(s=>s.id===editId);
  const viewing=students.find(s=>s.id===viewId);

  return (
    <div className="page" style={{maxWidth:isDesk?1240:680,margin:'0 auto',padding:isDesk?'8px 36px 32px':undefined}}>
      <div style={{padding:'var(--space-5) var(--space-4) var(--space-3)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'var(--space-4)'}}>
          <div>
            <h1 style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-strong)',letterSpacing:'-.02em'}}>{t('Students')}</h1>
            <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)'}}>{students.length} enrolled</div>
          </div>
          <Btn variant="primary" size="sm" iL={<Icon n="user-plus" size={15} />} onClick={()=>{setEditId(null);setShowForm(true);}}>{t('Add')}</Btn>
        </div>
        <div style={{position:'relative',marginBottom:'var(--space-3)'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',display:'flex',color:'var(--text-muted)'}}>
            <Icon n="search" size={17} />
          </span>
          <input type="search" placeholder={t('Search students or parents…')} value={q} onChange={e=>setQ(e.target.value)}
            style={{width:'100%',padding:'10px 12px 10px 40px',borderRadius:'var(--radius-md)',
              border:'1.5px solid var(--border-default)',background:'var(--paper)',
              fontFamily:'var(--font-sans)',fontSize:'var(--text-md)',color:'var(--text-strong)',outline:'none'}}
            onFocus={e=>e.target.style.borderColor='var(--navy-600)'}
            onBlur={e=>e.target.style.borderColor='var(--border-default)'}
          />
        </div>
        {/* Class filter */}
        {classes.length>1 && (
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[{id:'all',label:'All',tone:null},...classes.map(c=>({id:c.id,label:className(c),tone:c.tone}))].map(f=>{
              const on=classFilter===f.id;
              return (
                <button key={f.id} onClick={()=>setClassFilter(f.id)} style={{
                  display:'flex',alignItems:'center',gap:7,cursor:'pointer',padding:'6px 12px',
                  borderRadius:'var(--radius-pill)',fontFamily:'var(--font-sans)',fontSize:'var(--text-xs)',
                  border:on?'1.5px solid var(--navy-800)':'1px solid var(--border-default)',
                  background:on?'var(--navy-800)':'var(--surface-card)',
                  color:on?'var(--cream-50)':'var(--text-muted)',fontWeight:on?700:500}}>
                  {f.tone&&<span style={{width:8,height:8,borderRadius:'50%',background:`var(--${f.tone}-500)`}} />}
                  {f.label}
                </button>
              );
            })}
          </div>
        )}
      </div>

      <div style={{padding:'0 var(--space-4)'}}>
        {filtered.length===0 && (
          <div style={{textAlign:'center',padding:'var(--space-8) 0',color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>
            {q||classFilter!=='all'?'No students match':'No students yet — tap Add to get started'}
          </div>
        )}

        {/* Desktop: data table */}
        {isDesk && filtered.length>0 && (
          <div className="stagger" style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
            borderRadius:'var(--radius-lg)',overflow:'hidden',boxShadow:'var(--shadow-xs)'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'var(--font-sans)'}}>
              <thead>
                <tr style={{background:'var(--surface-sunken)'}}>
                  {['Student','Class','Age','Parent','Attendance','Last 5 Sundays',''].map(h=>(
                    <th key={h} style={{textAlign:'left',padding:'12px 16px',fontSize:11,fontWeight:700,
                      color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(s=>{
                  const streak=absenceStreak(s.id,attendance);
                  const rate=attendanceRate(s.id,attendance);
                  const sc=clsOf(s.classId);
                  const hist=studentHistory(s.id,attendance,5);
                  const dotC={p:'var(--leaf-500)',a:'var(--coral-500)',u:'var(--ink-200)'};
                  return (
                    <tr key={s.id} onClick={()=>setViewId(s.id)} style={{borderTop:'1px solid var(--border-soft)',cursor:'pointer',transition:'background 120ms ease'}}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--navy-50)'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <td style={{padding:'11px 16px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <Av name={s.name} size="sm" />
                          <div>
                            <div style={{fontWeight:700,color:'var(--text-strong)',fontSize:'var(--text-sm)',whiteSpace:'nowrap'}}>{s.name}</div>
                            <div style={{display:'flex',gap:4}}>
                              {s.visitor&&<Badge tone="grape" size="sm" style={{marginTop:3}}>Visitor</Badge>}
                              {streak>=3&&<Badge tone="coral" size="sm" style={{marginTop:3}}>Absent {streak}×</Badge>}
                            </div>
                          </div>
                        </div>
                      </td>
                      <td style={{padding:'11px 16px'}}>{sc&&<Badge tone={sc.tone} size="sm">{className(sc)}</Badge>}</td>
                      <td style={{padding:'11px 16px',fontSize:'var(--text-sm)',color:'var(--text-body)'}}>{s.age||'—'}</td>
                      <td style={{padding:'11px 16px'}}>
                        <div style={{fontSize:'var(--text-sm)',color:'var(--text-body)',whiteSpace:'nowrap'}}>{s.parentName||<span style={{color:'var(--text-subtle)',fontStyle:'italic'}}>—</span>}</div>
                        {s.parentPhone&&<div style={{fontSize:11,color:'var(--text-muted)'}}>{s.parentPhone}</div>}
                      </td>
                      <td style={{padding:'11px 16px',minWidth:130}}>
                        {rate!==null ? (
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div style={{flex:1,height:5,borderRadius:3,background:'var(--surface-sunken)',overflow:'hidden',minWidth:60}}>
                              <div style={{width:rate+'%',height:'100%',background:rate>=80?'var(--leaf-500)':rate>=60?'var(--sky-500)':'var(--coral-500)',borderRadius:3}} />
                            </div>
                            <span style={{fontSize:'var(--text-xs)',fontWeight:700,color:'var(--text-strong)',width:34}}>{rate}%</span>
                          </div>
                        ):<span style={{fontSize:'var(--text-xs)',color:'var(--text-subtle)'}}>No data</span>}
                      </td>
                      <td style={{padding:'11px 16px'}}>
                        <div style={{display:'flex',gap:4}}>
                          {hist.map(h=>(
                            <span key={h.date} title={fmtShort(h.date)} style={{width:14,height:14,borderRadius:'50%',background:dotC[h.mark],display:'inline-block'}} />
                          ))}
                        </div>
                      </td>
                      <td style={{padding:'11px 16px'}}>
                        <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                          {s.parentPhone&&(
                            <a href={`tel:${s.parentPhone}`} onClick={e=>e.stopPropagation()} style={{textDecoration:'none',width:30,height:30,borderRadius:'50%',
                              background:'var(--leaf-100)',color:'var(--leaf-500)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                              <Icon n="phone" size={13} />
                            </a>
                          )}
                          <button onClick={e=>{e.stopPropagation();setEditId(s.id);setShowForm(true);}} style={{width:30,height:30,
                            borderRadius:'50%',border:'none',background:'var(--navy-50)',color:'var(--navy-700)',
                            cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <Icon n="pencil" size={12} />
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* Phone: card list */}
        {!isDesk && filtered.map((s,idx)=>{
          const streak=absenceStreak(s.id,attendance);
          const rate=attendanceRate(s.id,attendance);
          const sc=clsOf(s.classId);
          return (
            <div key={s.id} className="stagger" onClick={()=>setViewId(s.id)}
              style={{display:'flex',alignItems:'center',gap:12,padding:'var(--space-4)',
              background:'var(--surface-card)',borderRadius:'var(--radius-lg)',marginBottom:'var(--space-3)',
              border:'1px solid var(--border-soft)',boxShadow:'var(--shadow-xs)',cursor:'pointer',
              animationDelay:`${Math.min(idx*22,330)}ms`,transition:'transform 150ms ease,box-shadow 150ms ease'}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='var(--shadow-md)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='var(--shadow-xs)';}}>
              <Av name={s.name} size="md" />
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span style={{fontWeight:700,color:'var(--text-strong)',fontSize:'var(--text-md)'}}>{s.name}</span>
                  {sc && <Badge tone={sc.tone} size="sm">{className(sc)}</Badge>}

                  {streak>=3 && <Badge tone="coral" size="sm"><Icon n="alert-circle" size={11} style={{marginRight:2}} />Absent {streak}×</Badge>}
                </div>
                <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:2}}>
                  {s.age?`Age ${s.age} · `:''}
                  {s.parentName||<span style={{fontStyle:'italic'}}>No parent info</span>}
                </div>
                {rate!==null && (
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:6}}>
                    <div style={{flex:1,height:4,borderRadius:2,background:'var(--surface-sunken)',overflow:'hidden'}}>
                      <div style={{width:rate+'%',height:'100%',background:rate>=80?'var(--leaf-500)':rate>=60?'var(--sky-500)':'var(--coral-500)',borderRadius:2}} />
                    </div>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',flexShrink:0}}>{rate}%</span>
                  </div>

              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {s.parentPhone && (
                  <a href={`tel:${s.parentPhone}`} onClick={e=>e.stopPropagation()}
