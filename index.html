*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{font-family:var(--font-sans);background:var(--surface-app);color:var(--text-body);

input,textarea,select,button{font-family:var(--font-sans)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink-300);border-radius:2px}
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;background:var(--paper);
  border-top:1.5px solid var(--border-soft);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 16px rgba(3,39,63,.06);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px;border:none;background:none;cursor:pointer;
  font-family:var(--font-sans);font-size:10px;font-weight:600;
  letter-spacing:.02em;color:var(--text-muted);transition:color 120ms ease;
}
.nav-btn.active{color:var(--navy-800)}
.page{padding-bottom:calc(70px + env(safe-area-inset-bottom));min-height:100dvh}
@media(min-width:768px){
  .bottom-nav{display:none}
  .page{padding-bottom:0;min-height:unset}
  .desktop-shell{display:grid;grid-template-columns:256px 1fr;min-height:100vh}
  .desktop-sidebar{display:flex!important}
  .mobile-page-wrap{display:contents}
}
.desktop-sidebar{display:none;flex-direction:column;background:var(--navy-800);
  padding:var(--space-5);gap:var(--space-4);position:sticky;top:0;height:100vh;overflow:hidden}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

function load(k, def) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch{return def;} }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch{} }
function uid() { return '_'+Math.random().toString(36).slice(2,9); }

function getSundays(n=14) {
  const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0);
  return Array.from({length:n},(_,i)=>{ const x=new Date(d); x.setDate(x.getDate()-i*7); return x; });
}
function dk(d){ return d.toISOString().split('T')[0]; }
function fmt(ds,opts){ return new Date(ds+'T00:00:00').toLocaleDateString('en-US',opts); }
function fmtShort(ds){ return fmt(ds,{month:'short',day:'numeric'}); }
function fmtFull(ds){ return fmt(ds,{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }

function absenceStreak(id, att) {
  const keys = Object.keys(att).sort().reverse();
  let n=0;
  for(const k of keys){
    const r=att[k];
    if(!(id in r)) continue;
    if(r[id]===true) break;
    n++;
  }
  return n;
}
function attendanceRate(id, att, weeks=8) {
  const keys=Object.keys(att).sort().reverse().slice(0,weeks);
  const marked=keys.filter(k=>id in att[k]);
  if(!marked.length) return null;
  return Math.round(marked.filter(k=>att[k][id]===true).length/marked.length*100);
}

    accent:{bg:'var(--cream-50)',fg:'var(--navy-900)',border:'1px solid var(--cream-50)',boxShadow:'var(--shadow-md)'},
    secondary:{bg:'var(--surface-card)',fg:'var(--navy-800)',border:'1.5px solid var(--navy-800)'},
    ghost:{bg:'transparent',fg:'var(--navy-700)',border:'1px solid transparent'},
    danger:{bg:'var(--danger-500)',fg:'#fff',border:'1px solid var(--danger-500)'},
    leaf:{bg:'var(--leaf-100)',fg:'#2F6B47',border:'1px solid var(--leaf-100)'},
  }[variant]||{bg:'var(--navy-800)',fg:'var(--cream-50)',border:'1px solid var(--navy-800)'};
  return (
    <button disabled={disabled} onClick={onClick} style={{
      display:'inline-flex',alignItems:'center',justifyContent:'center',
      gap:sz.g,fontFamily:'var(--font-sans)',fontWeight:600,
      fontSize:sz.f,padding:sz.p,borderRadius:sz.r,
      cursor:disabled?'not-allowed':'pointer',width:full?'100%':'auto',
      opacity:disabled?.5:1,lineHeight:1.1,whiteSpace:'nowrap',
      transition:'transform 120ms ease,filter 120ms ease',
      background:vs.bg,color:vs.fg,border:vs.border,boxShadow:vs.boxShadow||'none',
      ...style,
    }}
      onMouseEnter={e=>{if(!disabled)e.currentTarget.style.filter='brightness(1.06)';}}
      onMouseLeave={e=>{e.currentTarget.style.filter='none';e.currentTarget.style.transform='scale(1)';}}
      onMouseDown={e=>{if(!disabled)e.currentTarget.style.transform='scale(0.97)';}}
      onMouseUp={e=>{e.currentTarget.style.transform='scale(1)';}}
    >{iL}{children}{iR}</button>
  );
}

function Badge({ tone='navy', size='md', children, style={} }) {
  const t={navy:{bg:'var(--navy-100)',fg:'var(--navy-800)'},
            coral:{bg:'var(--coral-100)',fg:'#B23A2C'},leaf:{bg:'var(--leaf-100)',fg:'#2F6B47'},
            sky:{bg:'var(--sky-100)',fg:'#286179'},grape:{bg:'var(--grape-100)',fg:'#5C4480'},
            success:{bg:'var(--success-100)',fg:'#2F6B47'},warning:{bg:'var(--warning-100)',fg:'#9A6A12'},
            danger:{bg:'var(--danger-100)',fg:'#A93B33'},neutral:{bg:'var(--ink-100)',fg:'var(--ink-700)'},
           }[tone]||{bg:'var(--navy-100)',fg:'var(--navy-800)'};
  const s=size==='sm'?{fontSize:'11px',padding:'2px 7px'}:{fontSize:'var(--text-xs)',padding:'4px 10px'};
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,background:t.bg,color:t.fg,
    borderRadius:'var(--radius-pill)',fontWeight:600,whiteSpace:'nowrap',...s,...style}}>{children}</span>;
}

function Av({ name='', size='md', style={} }) {
  const dim={xs:26,sm:34,md:42,lg:54}[size]||42;
  const cols=['#EF6F5E','#4C9A6B','#4DA3C4','#8E6FB0','#2E6A88','#0A3956'];
  const init=name.split(' ').filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?';
  const bg=cols[[...name].reduce((a,c)=>a+c.charCodeAt(0),0)%cols.length];
  return <div style={{width:dim,height:dim,borderRadius:'50%',flexShrink:0,display:'inline-flex',
    alignItems:'center',justifyContent:'center',background:bg,color:'#fff',fontWeight:700,
    fontSize:dim*.38,userSelect:'none',boxShadow:'inset 0 0 0 2px rgba(255,255,255,.2)',...style}}>
    {init}
  </div>;
}

function StatTile({ icon, value, label, trend=null, tone='navy' }) {
  return (
    <div style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
      borderRadius:'var(--radius-lg)',padding:'var(--space-4)',boxShadow:'var(--shadow-xs)',
      display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{width:38,height:38,borderRadius:'var(--radius-md)',display:'inline-flex',
          alignItems:'center',justifyContent:'center',
          background:`var(--${tone}-100)`,color:`var(--${tone}-500)`}}>
          <Icon n={icon} size={18} />
        </span>
        {trend && (
          <span style={{fontSize:11,fontWeight:700,
            color:trend.dir==='down'?'var(--danger-500)':'var(--success-500)',
            background:trend.dir==='down'?'var(--danger-100)':'var(--success-100)',
            padding:'3px 8px',borderRadius:'var(--radius-pill)'}}>
            {trend.dir==='down'?'▾':'▴'} {trend.value}
          </span>
        )}
      </div>
      <div>
        <div style={{fontSize:'var(--text-2xl)',fontWeight:800,color:'var(--text-strong)',
          letterSpacing:'-.02em',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{value}</div>
        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:5,fontWeight:500}}>{label}</div>
      </div>
    </div>
  );
}

function Input({ label, placeholder, value, onChange, type='text', iL, required, error, multi, rows=3, hint }) {
  const baseStyle = {
    width:'100%',fontFamily:'var(--font-sans)',fontSize:'var(--text-md)',
    padding:iL?'10px 12px 10px 42px':'10px 14px',
    borderRadius:'var(--radius-md)',border:`1.5px solid ${error?'var(--danger-500)':'var(--border-default)'}`,
    background:'var(--paper)',color:'var(--text-strong)',outline:'none',
    transition:'border-color 150ms ease',
  };
  return (
    <div>
      {label && <label style={{display:'block',fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)',marginBottom:6}}>
        {label}{required && <span style={{color:'var(--coral-500)',marginLeft:3}}>*</span>}
      </label>}
      <div style={{position:'relative'}}>
        {iL && <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',display:'flex',pointerEvents:'none'}}>{iL}</span>}
        {multi ? <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows}
          style={{...baseStyle,resize:'vertical'}}
          onFocus={e=>e.target.style.borderColor='var(--navy-600)'}
          onBlur={e=>e.target.style.borderColor=error?'var(--danger-500)':'var(--border-default)'} />
        : <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={baseStyle}
          onFocus={e=>e.target.style.borderColor='var(--navy-600)'}
          onBlur={e=>e.target.style.borderColor=error?'var(--danger-500)':'var(--border-default)'} />}
      </div>
      {error && <div style={{fontSize:'var(--text-xs)',color:'var(--danger-500)',marginTop:4}}>{error}</div>}
      {hint && !error && <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:4}}>{hint}</div>}
    </div>
  );
}

function Modal({ open, onClose, title, children, footer }) {
  useEffect(()=>{ document.body.style.overflow=open?'hidden':''; return()=>{document.body.style.overflow='';};}, [open]);
  if(!open) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(2,26,43,.55)',backdropFilter:'blur(4px)',
      display:'flex',alignItems:'flex-end',animation:'fadeIn 150ms ease'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:'100%',maxWidth:600,margin:'0 auto',background:'var(--paper)',
        borderRadius:'var(--radius-2xl) var(--radius-2xl) 0 0',maxHeight:'92dvh',
        overflow:'hidden',display:'flex',flexDirection:'column',animation:'slideUp 200ms cubic-bezier(0.22,1,0.36,1)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'var(--space-5)',borderBottom:'1px solid var(--border-soft)',flexShrink:0}}>
          <div style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-strong)'}}>{title}</div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:'50%',border:'none',
            background:'var(--surface-sunken)',cursor:'pointer',display:'flex',alignItems:'center',
            justifyContent:'center',color:'var(--text-muted)'}}>
            <Icon n="x" size={18} />
          </button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'var(--space-5)',WebkitOverflowScrolling:'touch'}}>
          {children}
        </div>
        {footer && <div style={{padding:'var(--space-4) var(--space-5)',borderTop:'1px solid var(--border-soft)',
          display:'flex',gap:'var(--space-3)',justifyContent:'flex-end',flexShrink:0,
          paddingBottom:'calc(var(--space-4) + env(safe-area-inset-bottom))'}}>
          {footer}
        </div>}
      </div>
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({ students, attendance, sessions, onNav, onReset }) {
  const [showSettings, setShowSettings] = useState(false);
  const today = dk(getSundays(1)[0]);
  const todayAtt = attendance[today]||{};
  const present = students.filter(s=>todayAtt[s.id]===true).length;
  const marked = Object.keys(todayAtt).length;
  const alerts = students.filter(s=>absenceStreak(s.id,attendance)>=3);
  const upcoming = [...sessions].sort((a,b)=>a.date.localeCompare(b.date)).find(s=>s.date>=today);
  const recentKeys = Object.keys(attendance).sort().reverse().slice(0,4);

  // Recorded Sundays (with data), most-recent first
  const recordedKeys = Object.keys(attendance).filter(k=>Object.keys(attendance[k]).length>0).sort().reverse();
  const prevKey = recordedKeys.find(k=>k!==today);
  const presentOf = k => Object.values(attendance[k]||{}).filter(Boolean).length;
  const rateOf = k => { const r=attendance[k]||{}; const t=Object.keys(r).length; return t?Math.round(Object.values(r).filter(Boolean).length/t*100):0; };

  // Week-over-week trend for "Present today"
  let presentTrend = null;
  if(marked>0 && prevKey){
    const diff = present - presentOf(prevKey);
    if(diff!==0) presentTrend = { dir: diff>0?'up':'down', value: Math.abs(diff) };
  }
  // Trend for attendance rate (today vs previous recorded Sunday)
  const rateToday = marked>0 ? rateOf(today) : (prevKey?rateOf(prevKey):null);
  let rateTrend = null;
  if(marked>0 && prevKey){
    const diff = rateOf(today) - rateOf(prevKey);
    if(diff!==0) rateTrend = { dir: diff>0?'up':'down', value: Math.abs(diff)+'%' };
  }

  // Onboarding checklist — each step disappears once done
  const hasPhones = students.some(s=>s.parentPhone);
  const steps = [
    { done: recordedKeys.length>0, label:'Take your first attendance', sub:'Mark who came this Sunday', icon:'check-circle-2', go:'attendance' },
    { done: hasPhones, label:'Add parent phone numbers', sub:'So you can follow up on absences', icon:'phone', go:'students' },
    { done: sessions.length>0, label:'Plan a lesson', sub:'Outline this week’s session', icon:'book-open', go:'sessions' },
  ];
  const showChecklist = students.length>0 && steps.some(s=>!s.done);

  return (
    <div className="page" style={{maxWidth:680,margin:'0 auto'}}>
      {/* Hero banner */}
      <div style={{background:'var(--navy-800)',borderRadius:'0 0 var(--radius-2xl) var(--radius-2xl)',
        padding:'var(--space-6) var(--space-5)',color:'var(--cream-50)',position:'relative',overflow:'hidden',
        backgroundImage:'radial-gradient(120% 140% at 100% 0%,rgba(143,178,198,.2),transparent 55%)'}}>
        <Logo color="var(--cream-50)" size={200} style={{position:'absolute',right:-30,top:-30,opacity:.06,pointerEvents:'none'}} />
        <div style={{position:'relative'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:'var(--space-5)'}}>
            <Logo color="var(--cream-50)" size={34} />
            <div style={{lineHeight:1.1}}>
              <div style={{color:'var(--cream-50)',fontWeight:800,fontSize:'var(--text-md)'}}>FECMY</div>
              <div style={{color:'var(--navy-300)',fontSize:11,fontWeight:600}}>Children Ministry</div>
            </div>
            <button onClick={()=>setShowSettings(true)} aria-label="Settings" style={{marginLeft:'auto',
              width:38,height:38,borderRadius:'50%',border:'1px solid rgba(251,247,240,.2)',
              background:'rgba(251,247,240,.08)',color:'var(--cream-50)',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon n="settings" size={18} />
            </button>
          </div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--navy-100)'}}>
            {fmtFull(today)}
          </div>
          <h1 style={{fontSize:'var(--text-2xl)',fontWeight:800,marginTop:6,letterSpacing:'-.02em',lineHeight:1.15}}>
            Good {new Date().getHours()<12?'morning':'afternoon'}
          </h1>
          <p style={{fontSize:'var(--text-sm)',color:'var(--navy-100)',marginTop:4,lineHeight:1.5}}>
            {students.length} students · {marked>0?`${present} checked in today`:'No attendance yet today'}
          </p>
          <div style={{display:'flex',gap:10,marginTop:16,flexWrap:'wrap'}}>
            <Btn variant="accent" size="sm" iL={<Icon n="check-circle-2" size={15} />} onClick={()=>onNav('attendance')}>
              Take attendance
            </Btn>
            <Btn variant="ghost" size="sm" onClick={()=>onNav('students')}
              style={{color:'var(--cream-50)',borderColor:'rgba(251,247,240,.3)'}}>
              View students
            </Btn>
          </div>
        </div>
      </div>

      <div style={{padding:'var(--space-4) var(--space-4) 0'}}>
        {/* Stats — StatTile from the design system, 2×2 grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'var(--space-3)',marginTop:'var(--space-4)'}}>
          <StatTile icon="users" value={students.length} label="Students enrolled" tone="navy" />
          <StatTile icon="check-circle-2" value={marked>0?present:'—'} label="Present today" tone="leaf" trend={presentTrend} />
          <StatTile icon="percent" value={rateToday!==null?rateToday+'%':'—'} label={marked>0?'Attendance today':'Last attendance'} tone="sky" trend={rateTrend} />
          <StatTile icon="bell-ring" value={alerts.length} label="Need follow-up" tone={alerts.length?'coral':'grape'} />
        </div>

        {/* Getting-started checklist — fades away as steps are done */}
        {showChecklist && (
          <div style={{marginTop:'var(--space-4)',background:'var(--surface-card)',border:'1px solid var(--border-soft)',
            borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-xs)',overflow:'hidden'}}>
            <div style={{padding:'var(--space-4) var(--space-4) 0'}}>
              <div style={{fontSize:'var(--text-md)',fontWeight:800,color:'var(--text-strong)'}}>Get set up</div>
              <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:2}}>
                {steps.filter(s=>s.done).length} of {steps.length} done
              </div>
            </div>
            <div style={{marginTop:'var(--space-3)'}}>
              {steps.map((st,i)=>(
                <button key={st.label} onClick={()=>!st.done&&onNav(st.go)} disabled={st.done}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 16px',
                    border:'none',borderTop:'1px solid var(--border-soft)',
                    background:st.done?'var(--surface-sunken)':'transparent',
                    cursor:st.done?'default':'pointer',textAlign:'left',fontFamily:'var(--font-sans)'}}>
                  <span style={{width:30,height:30,borderRadius:'50%',flexShrink:0,display:'flex',
                    alignItems:'center',justifyContent:'center',
                    background:st.done?'var(--leaf-500)':'var(--navy-50)',
                    color:st.done?'#fff':'var(--navy-600)'}}>
                    <Icon n={st.done?'check':st.icon} size={15} />
                  </span>
                  <span style={{flex:1,minWidth:0}}>
                    <span style={{display:'block',fontWeight:600,fontSize:'var(--text-sm)',
                      color:st.done?'var(--text-muted)':'var(--text-strong)',
                      textDecoration:st.done?'line-through':'none'}}>{st.label}</span>
                    {!st.done&&<span style={{display:'block',fontSize:11,color:'var(--text-muted)',marginTop:1}}>{st.sub}</span>}
                  </span>
                  {!st.done&&<Icon n="chevron-down" size={16} color="var(--text-subtle)" style={{transform:'rotate(-90deg)'}} />}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Absence alerts */}
        {alerts.length>0 && (
          <div style={{marginTop:'var(--space-4)',background:'var(--coral-100)',borderRadius:'var(--radius-lg)',
            padding:'var(--space-4)',border:'1px solid rgba(239,111,94,.2)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,color:'#B23A2C'}}>
              <Icon n="alert-circle" size={17} />
              <span style={{fontWeight:700,fontSize:'var(--text-sm)'}}>
                {alerts.length} student{alerts.length>1?'s':''} absent 3+ consecutive Sundays
              </span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {alerts.map(s=>(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,background:'var(--paper)',
                  borderRadius:'var(--radius-md)',padding:'10px 12px'}}>
                  <Av name={s.name} size="sm" />
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'var(--text-sm)',color:'var(--text-strong)',
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>{absenceStreak(s.id,attendance)} Sundays missed</div>
                  </div>
                  {s.parentPhone ? (
                    <a href={`tel:${s.parentPhone}`} style={{textDecoration:'none',display:'flex',alignItems:'center',
                      justifyContent:'center',width:34,height:34,borderRadius:'50%',background:'var(--coral-500)',color:'#fff'}}>
                      <Icon n="phone" size={15} />
                    </a>
                  ) : (
                    <button onClick={()=>onNav('students')} style={{fontSize:11,fontWeight:600,color:'#B23A2C',
                      background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font-sans)'}}>Add phone</button>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Upcoming session */}
        {upcoming && (
          <div style={{marginTop:'var(--space-4)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',marginBottom:8,
              letterSpacing:'.05em',textTransform:'uppercase'}}>Next session</div>
            <div style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
              borderRadius:'var(--radius-lg)',padding:'var(--space-4)',boxShadow:'var(--shadow-xs)',
              display:'flex',gap:12,alignItems:'flex-start'}}>
              <div style={{width:44,height:44,borderRadius:'var(--radius-md)',background:'var(--navy-50)',
                display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'var(--navy-700)'}}>
                <Icon n="book-open" size={20} />
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,color:'var(--text-strong)'}}>{upcoming.title}</div>
                {upcoming.scripture && <div style={{fontSize:'var(--text-sm)',color:'var(--navy-600)',fontWeight:600,marginTop:2}}>{upcoming.scripture}</div>}
                <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:4}}>{fmtShort(upcoming.date)}</div>
              </div>
            </div>
          </div>
        )}

        {/* Recent attendance */}
        {recentKeys.length>0 && (
          <div style={{marginTop:'var(--space-4)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase'}}>Recent attendance</div>
              <button onClick={()=>onNav('attendance')} style={{background:'none',border:'none',cursor:'pointer',
                fontSize:'var(--text-xs)',color:'var(--navy-600)',fontWeight:600,fontFamily:'var(--font-sans)'}}>View all →</button>
            </div>
            <div style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
              borderRadius:'var(--radius-lg)',overflow:'hidden',boxShadow:'var(--shadow-xs)'}}>
              {recentKeys.map((ds,i)=>{
                const r=attendance[ds];
                const p=Object.values(r).filter(Boolean).length;
                const t=Object.keys(r).length;
                const pct=t?Math.round(p/t*100):0;
                return <div key={ds} style={{display:'flex',alignItems:'center',gap:12,
                  padding:'12px 16px',borderBottom:i<recentKeys.length-1?'1px solid var(--border-soft)':'none'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)'}}>{fmtShort(ds)}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>{p}/{t} present</div>
                  </div>
                  <div style={{width:72,height:5,borderRadius:3,background:'var(--surface-sunken)',overflow:'hidden'}}>
                    <div style={{width:pct+'%',height:'100%',background:pct>=80?'var(--leaf-500)':pct>=60?'var(--sky-500)':'var(--coral-500)',borderRadius:3,transition:'width 300ms ease'}} />
                  </div>
                  <div style={{fontSize:'var(--text-xs)',fontWeight:700,color:'var(--text-strong)',width:28,textAlign:'right'}}>{pct}%</div>
                </div>;
              })}
            </div>
          </div>
        )}

        {/* Empty state */}
        {students.length===0 && (
          <div style={{marginTop:'var(--space-5)',textAlign:'center',padding:'var(--space-7) var(--space-5)'}}>
            <div style={{width:60,height:60,borderRadius:'var(--radius-xl)',background:'var(--navy-50)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
              <Icon n="users" size={26} color="var(--navy-600)" />
            </div>
            <div style={{fontWeight:700,fontSize:'var(--text-lg)',color:'var(--text-strong)'}}>Add your first student</div>
            <div style={{fontSize:'var(--text-sm)',color:'var(--text-muted)',marginTop:6,maxWidth:'32ch',margin:'6px auto 0'}}>Go to Students to add your class members</div>
            <Btn variant="primary" onClick={()=>onNav('students')} style={{marginTop:16}} iL={<Icon n="user-plus" size={16} />}>Add students</Btn>
          </div>
        )}

        <div style={{height:16}} />
      </div>

      <SettingsSheet open={showSettings} onClose={()=>setShowSettings(false)} onReset={onReset}
        students={students} attendance={attendance} sessions={sessions} />
    </div>
  );
}

function SettingsSheet({ open, onClose, onReset, students, attendance, sessions }) {
  const [confirm,setConfirm]=useState(false);
  useEffect(()=>{ if(!open) setConfirm(false); },[open]);
  const recorded=Object.keys(attendance).filter(k=>Object.keys(attendance[k]).length>0).length;

  const exportCsv=()=>{
    const dates=Object.keys(attendance).filter(k=>Object.keys(attendance[k]).length>0).sort();
    const head=['Name','Phone',...dates.map(fmtShort)].join(',');
    const rows=students.map(s=>{
      const cells=dates.map(d=>attendance[d][s.id]===true?'P':attendance[d][s.id]===false?'A':'');
      return ['"'+s.name+'"','"'+(s.parentPhone||'')+'"',...cells].join(',');
    });
    const csv=[head,...rows].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='fecmy-attendance.csv'; a.click();
  };

  return (
    <Modal open={open} onClose={onClose} title="Settings"
      footer={<Btn variant="ghost" size="sm" onClick={onClose}>Done</Btn>}>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <div style={{background:'var(--surface-sunken)',borderRadius:'var(--radius-md)',padding:'var(--space-4)'}}>
          <div style={{fontSize:'var(--text-sm)',fontWeight:700,color:'var(--text-strong)',marginBottom:8}}>This device holds</div>
          <div style={{display:'flex',gap:20}}>
            {[[students.length,'students'],[recorded,'Sundays recorded'],[sessions.length,'sessions']].map(([n,l])=>(
              <div key={l}>
                <div style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--navy-800)',lineHeight:1}}>{n}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        <Btn variant="secondary" full iL={<Icon n="download" size={16} />} onClick={exportCsv}>Export attendance (CSV)</Btn>

        <div style={{borderTop:'1px solid var(--border-soft)',paddingTop:'var(--space-4)'}}>
          <div style={{fontSize:'var(--text-sm)',fontWeight:700,color:'var(--text-strong)'}}>Start fresh</div>
          <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:4,lineHeight:1.5}}>
            Clears all attendance and sessions and restores the original 49-student roster. This cannot be undone — export first if you want a copy.
          </div>
          {!confirm ? (
            <Btn variant="ghost" size="sm" style={{color:'var(--danger-500)',marginTop:10,paddingLeft:0}}
              iL={<Icon n="refresh" size={15} />} onClick={()=>setConfirm(true)}>Reset everything</Btn>
          ) : (
            <div style={{display:'flex',gap:8,marginTop:10,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontSize:'var(--text-sm)',color:'var(--danger-500)',fontWeight:600}}>Erase all data?</span>
              <Btn variant="danger" size="sm" onClick={onReset}>Yes, start fresh</Btn>
              <Btn variant="ghost" size="sm" onClick={()=>setConfirm(false)}>Cancel</Btn>
            </div>
          )}
        </div>
      </div>
    </Modal>
  );
}

/* ── STUDENTS ── */

function StudentForm({ open, student, onSave, onDelete, onClose }) {
  const blank={name:'',age:'',parentName:'',parentPhone:'',notes:''};
  const [f,setF]=useState(blank);
  const [err,setErr]=useState({});
  const [confirm,setConfirm]=useState(false);

  useEffect(()=>{
    if(open){
      setF(student?{name:student.name,age:student.age||'',parentName:student.parentName||'',
        parentPhone:student.parentPhone||'',notes:student.notes||''}:blank);
      setErr({}); setConfirm(false);
    }
  },[open,student]);

  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const valid=()=>{
    const e={};
    if(!f.name.trim()) e.name='Name is required';
    return e;
  };
  const go=()=>{
    const e=valid(); if(Object.keys(e).length){setErr(e);return;}
    onSave({name:f.name.trim(),age:f.age?Number(f.age):'',parentName:f.parentName.trim(),parentPhone:f.parentPhone.trim(),notes:f.notes.trim()});
  };

  return (
    <Modal open={open} onClose={onClose} title={student?'Edit student':'Add student'}
      footer={<>
        {student&&!confirm&&<Btn variant="ghost" size="sm" style={{color:'var(--danger-500)',marginRight:'auto'}} onClick={()=>setConfirm(true)}>
          <Icon n="trash-2" size={15} style={{marginRight:4}} />Delete</Btn>}
        {confirm&&<div style={{display:'flex',gap:8,marginRight:'auto',alignItems:'center'}}>
          <span style={{fontSize:'var(--text-sm)',color:'var(--danger-500)',fontWeight:600}}>Remove student?</span>
          <Btn variant="danger" size="sm" onClick={onDelete}>Remove</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>setConfirm(false)}>Cancel</Btn>
        </div>}
        <Btn variant="ghost" size="sm" onClick={onClose}>Cancel</Btn>
        <Btn variant="primary" size="sm" onClick={go}>Save</Btn>
      </>}>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <Input label="Full name" placeholder="e.g. ሃሌሉያ ዳዊት" value={f.name} onChange={set('name')} required error={err.name} />
        <Input label="Age" type="number" placeholder="e.g. 12" value={f.age} onChange={set('age')} hint="Ages 10–14 for this class" />
        <Input label="Parent / guardian name" placeholder="e.g. ዳዊት ሃሌሉያ" value={f.parentName} onChange={set('parentName')} />
        <Input label="Parent phone" type="tel" placeholder="+251 91 234 5678" value={f.parentPhone} onChange={set('parentPhone')} hint="For absence alerts. Include country code (+251…)" />
        <Input label="Notes" placeholder="Any important notes…" value={f.notes} onChange={set('notes')} multi rows={3} />
      </div>
    </Modal>
  );
}

/* ── ATTENDANCE ── */
function Attendance({ students, attendance, onSave }) {
  const sundays=getSundays(14);
  const [selDate,setSelDate]=useState(dk(sundays[0]));
  const [marks,setMarks]=useState({});
  const [saved,setSaved]=useState(false);
  const [showPicker,setShowPicker]=useState(false);

  useEffect(()=>{
    const ex=attendance[selDate]||{};
    setMarks(Object.fromEntries(students.map(s=>[s.id,ex[s.id]??null])));
    setSaved(!!Object.keys(attendance[selDate]||{}).length);
  },[selDate,students.length]);

  const toggle=id=>{
    setSaved(false);
    setMarks(m=>({...m,[id]:m[id]===true?false:true}));
  };
  const markAll=v=>{ setSaved(false); setMarks(Object.fromEntries(students.map(s=>[s.id,v]))); };
  const present=Object.values(marks).filter(v=>v===true).length;
  const absent=Object.values(marks).filter(v=>v===false).length;

  const doSave=()=>{
    // only save explicitly marked students
    const toSave=Object.fromEntries(Object.entries(marks).filter(([,v])=>v!==null));
    onSave(selDate,toSave);
    setSaved(true);
  };

  return (
    <div className="page" style={{maxWidth:680,margin:'0 auto'}}>
      <div style={{padding:'var(--space-5) var(--space-4) 0'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'var(--space-4)'}}>
          <div>
            <h1 style={{fontSize:'var(--text-xl)',fontWeight:800,color:'var(--text-strong)',letterSpacing:'-.02em'}}>Attendance</h1>
            <button onClick={()=>setShowPicker(p=>!p)} style={{display:'flex',alignItems:'center',gap:5,
              background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font-sans)',
              fontSize:'var(--text-sm)',color:'var(--navy-700)',fontWeight:600,padding:'3px 0'}}>
              <Icon n="calendar" size={14} />{fmtShort(selDate)}<Icon n="chevron-down" size={13} />
            </button>
          </div>
          <Btn variant={saved?'leaf':'primary'} size="sm"
            iL={<Icon n={saved?'check':'save'} size={15} />} onClick={doSave}>
            {saved?'Saved':'Save'}
          </Btn>
        </div>

        {/* Date picker */}
        {showPicker && (
          <div style={{background:'var(--paper)',border:'1px solid var(--border-soft)',
            borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-md)',marginBottom:'var(--space-4)',overflow:'hidden',maxHeight:280,overflowY:'auto'}}>
            {sundays.map(s=>{
              const k=dk(s); const r=attendance[k];
              const has=r&&Object.keys(r).length>0;
              return (
                <button key={k} onClick={()=>{setSelDate(k);setShowPicker(false);}} style={{
                  width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',
                  padding:'12px 16px',background:k===selDate?'var(--navy-50)':'transparent',
                  border:'none',borderBottom:'1px solid var(--border-soft)',cursor:'pointer',
                  fontFamily:'var(--font-sans)',textAlign:'left'}}>
                  <span style={{fontWeight:k===selDate?700:500,color:k===selDate?'var(--navy-800)':'var(--text-body)',fontSize:'var(--text-sm)'}}>
                    {fmtFull(k)}
                  </span>
                  {has?<Badge tone="leaf" size="sm">{Object.values(r).filter(Boolean).length}/{Object.keys(r).length}</Badge>
                      :<span style={{fontSize:11,color:'var(--text-subtle)'}}>No data</span>}
                </button>
              );
            })}
          </div>
        )}

        {/* Progress card */}
        <div style={{background:'var(--surface-card)',border:'1px solid var(--border-soft)',
          borderRadius:'var(--radius-lg)',padding:'var(--space-4)',marginBottom:'var(--space-4)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{display:'flex',gap:16}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:'var(--text-2xl)',fontWeight:800,color:'var(--leaf-500)',lineHeight:1}}>{present}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Present</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:'var(--text-2xl)',fontWeight:800,color:'var(--coral-500)',lineHeight:1}}>{absent}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Absent</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:'var(--text-2xl)',fontWeight:800,color:'var(--text-subtle)',lineHeight:1}}>{students.length-present-absent}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Unmarked</div>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:'var(--text-3xl)',fontWeight:800,color:'var(--navy-800)',lineHeight:1}}>
                {students.length?Math.round(present/students.length*100):0}%
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Attendance rate</div>
            </div>
          </div>
          <div style={{height:8,borderRadius:'var(--radius-pill)',background:'var(--surface-sunken)',overflow:'hidden'}}>
            <div style={{width:(students.length?present/students.length*100:0)+'%',height:'100%',
              background:'var(--leaf-500)',borderRadius:'var(--radius-pill)',transition:'width 300ms ease'}} />
          </div>
          <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
            <Btn variant="ghost" size="sm" iL={<Icon n="check-check" size={14} />} onClick={()=>markAll(true)}>All present</Btn>
            <Btn variant="ghost" size="sm" iL={<Icon n="x" size={14} />} onClick={()=>markAll(false)}>All absent</Btn>
          </div>
        </div>
      </div>

      {/* Roster */}
      <div style={{padding:'0 var(--space-4)'}}>
        {students.length===0 && <div style={{textAlign:'center',padding:'var(--space-8) 0',color:'var(--text-muted)',fontSize:'var(--text-sm)'}}>
          Add students first to take attendance
        </div>}
        {students.map(s=>{
          const st=marks[s.id];
          const isPresent=st===true, isAbsent=st===false;
          return (
            <div key={s.id} style={{display:'flex',alignItems:'center',gap:12,padding:'var(--space-4)',
              background:'var(--surface-card)',borderRadius:'var(--radius-lg)',marginBottom:'var(--space-2)',
              border:`1.5px solid ${isPresent?'var(--leaf-500)':isAbsent?'var(--coral-500)':'var(--border-soft)'}`,
              boxShadow:'var(--shadow-xs)',transition:'border-color 150ms ease'}}>
              <Av name={s.name} size="md" />
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,color:'var(--text-strong)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</div>
                {s.age&&<div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>Age {s.age}</div>}
              </div>
              <button onClick={()=>toggle(s.id)} style={{
                display:'flex',alignItems:'center',gap:7,padding:'9px 14px',
                borderRadius:'var(--radius-pill)',border:`1.5px solid ${isPresent?'var(--leaf-500)':isAbsent?'var(--coral-500)':'var(--border-default)'}`,
                background:isPresent?'var(--leaf-100)':isAbsent?'var(--coral-100)':'var(--surface-card)',
                color:isPresent?'#2F6B47':isAbsent?'#B23A2C':'var(--text-muted)',
                cursor:'pointer',fontFamily:'var(--font-sans)',fontWeight:700,fontSize:'var(--text-sm)',
                transition:'all 150ms ease',whiteSpace:'nowrap',flexShrink:0}}>
                <Icon n={isPresent?'check':isAbsent?'x':'circle'} size={15} />
                {isPresent?'Present':isAbsent?'Absent':'Mark'}
              </button>
            </div>
          );
        })}
        <div style={{height:8}} />
      </div>
    </div>
  );
}

/* ── SESSIONS ── */

function SessionForm({ open, session, onSave, onDelete, onClose }) {
  const sun=getSundays(14);
  const blank={title:'',scripture:'',theme:'',date:dk(sun[0]),notes:'',materials:''};
  const [f,setF]=useState(blank);
  const [err,setErr]=useState({});
  const [confirm,setConfirm]=useState(false);

  useEffect(()=>{
    if(open){
      setF(session?{title:session.title,scripture:session.scripture||'',theme:session.theme||'',
        date:session.date,notes:session.notes||'',materials:(session.materials||[]).join(', ')}:blank);
      setErr({}); setConfirm(false);
    }
  },[open,session]);

  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const go=()=>{
    if(!f.title.trim()){setErr({title:'Title required'});return;}
    onSave({title:f.title.trim(),scripture:f.scripture.trim(),theme:f.theme.trim(),date:f.date,
      notes:f.notes.trim(),materials:f.materials.split(',').map(m=>m.trim()).filter(Boolean)});
  };

  return (
    <Modal open={open} onClose={onClose} title={session?'Edit session':'Plan session'}
      footer={<>
        {session&&!confirm&&<Btn variant="ghost" size="sm" style={{color:'var(--danger-500)',marginRight:'auto'}} onClick={()=>setConfirm(true)}>
          <Icon n="trash-2" size={15} style={{marginRight:4}} />Delete</Btn>}
        {confirm&&<div style={{display:'flex',gap:8,marginRight:'auto',alignItems:'center'}}>
          <span style={{fontSize:'var(--text-sm)',color:'var(--danger-500)',fontWeight:600}}>Remove?</span>
          <Btn variant="danger" size="sm" onClick={onDelete}>Remove</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>setConfirm(false)}>Cancel</Btn>
        </div>}
        <Btn variant="ghost" size="sm" onClick={onClose}>Cancel</Btn>
        <Btn variant="primary" size="sm" onClick={go}>Save</Btn>
      </>}>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <Input label="Lesson title" placeholder="e.g. The Good Samaritan" value={f.title} onChange={set('title')} required error={err.title} />
        <Input label="Scripture" placeholder="e.g. Luke 10:25–37" value={f.scripture} onChange={set('scripture')} />
        <Input label="Theme / main idea" placeholder="e.g. Love your neighbor" value={f.theme} onChange={set('theme')} />
        <div>
          <label style={{display:'block',fontSize:'var(--text-sm)',fontWeight:600,color:'var(--text-strong)',marginBottom:6}}>
            Date <span style={{color:'var(--coral-500)'}}>*</span>
          </label>
          <select value={f.date} onChange={set('date')} style={{width:'100%',padding:'10px 14px',
            borderRadius:'var(--radius-md)',border:'1.5px solid var(--border-default)',
            background:'var(--paper)',fontFamily:'var(--font-sans)',fontSize:'var(--text-md)',
            color:'var(--text-strong)',outline:'none'}}>
            {sun.map(s=>{ const k=dk(s); return <option key={k} value={k}>{fmtFull(k)}</option>; })}
          </select>
        </div>
        <Input label="Notes / lesson plan" placeholder="Key points, discussion questions, activities…" value={f.notes} onChange={set('notes')} multi rows={4} />
        <Input label="Materials needed" placeholder="Bible, worksheets, colored pencils…" value={f.materials} onChange={set('materials')} hint="Separate with commas" />
      </div>
    </Modal>
  );
}

/* ── NAV ── */
const TABS=[
  {id:'dashboard',i:'layout-dashboard',l:'Dashboard'},
  {id:'students',i:'users',l:'Students'},
  {id:'attendance',i:'check-circle-2',l:'Attendance'},
  {id:'sessions',i:'book-open',l:'Sessions'},
];

function Sidebar({ tab, onTab, count }) {
  return (
    <div className="desktop-sidebar">
      <div style={{display:'flex',alignItems:'center',gap:12,paddingBottom:'var(--space-4)',borderBottom:'1px solid rgba(255,255,255,.1)'}}>
        <Logo color="var(--cream-50)" size={40} />
        <div>
          <div style={{color:'var(--cream-50)',fontWeight:800,fontSize:'var(--text-md)'}}>FECMY</div>
          <div style={{color:'var(--navy-300)',fontSize:'var(--text-xs)',fontWeight:600}}>Children Ministry</div>
        </div>
      </div>
      <nav style={{display:'flex',flexDirection:'column',gap:3,flex:1}}>
        {TABS.map(({id,i,l})=>{
          const on=tab===id;
          return <button key={id} onClick={()=>onTab(id)} style={{
            display:'flex',alignItems:'center',gap:12,width:'100%',padding:'11px 14px',
            borderRadius:'var(--radius-md)',border:'none',cursor:'pointer',
            background:on?'var(--navy-700)':'transparent',
            color:on?'var(--cream-50)':'var(--navy-300)',
            fontFamily:'var(--font-sans)',fontSize:'var(--text-md)',fontWeight:on?700:500,
            transition:'background 120ms,color 120ms',textAlign:'left'}}
            onMouseEnter={e=>{if(!on){e.currentTarget.style.background='rgba(255,255,255,.08)';e.currentTarget.style.color='var(--cream-50)';}}}
            onMouseLeave={e=>{if(!on){e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--navy-300)';}}}
          >
            <Icon n={i} size={19} />{l}
          </button>;
        })}
      </nav>
      <div style={{padding:12,borderRadius:'var(--radius-md)',background:'var(--navy-900)'}}>
        <div style={{fontSize:'var(--text-xs)',color:'var(--navy-300)',fontWeight:600,marginBottom:3}}>FECMY Children Ministry</div>
        <div style={{fontSize:11,color:'var(--navy-500)'}}>{count} students enrolled</div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [tab,setTab]=useState('dashboard');
  const [students,setStudents]=useState(()=>load(SK.children,null)??INITIAL_STUDENTS);
  const [attendance,setAttendance]=useState(()=>load(SK.attendance,{}));
  const [sessions,setSessions]=useState(()=>load(SK.sessions,[]));

  const saveS=v=>{setStudents(v);save(SK.children,v);};
  const saveSess=v=>{setSessions(v);save(SK.sessions,v);};

  const resetAll=()=>{
    [SK.children,SK.attendance,SK.sessions].forEach(k=>{ try{localStorage.removeItem(k);}catch{} });
    setStudents(INITIAL_STUDENTS); setAttendance({}); setSessions([]); setTab('dashboard');
  };

  const screens={
    dashboard:<Dashboard students={students} attendance={attendance} sessions={sessions} onNav={setTab} onReset={resetAll} />,
    students:<Students students={students} attendance={attendance}
      onAdd={d=>saveS([...students,{...d,id:uid(),addedAt:dk(new Date())}])}
      onEdit={d=>saveS(students.map(s=>s.id===d.id?d:s))}
      onDelete={id=>saveS(students.filter(s=>s.id!==id))} />,
    attendance:<Attendance students={students} attendance={attendance} onSave={(ds,marks)=>{
      const n={...attendance,[ds]:marks};setAttendance(n);save(SK.attendance,n);
    }} />,
    sessions:<Sessions sessions={sessions}
      onAdd={d=>saveSess([...sessions,{...d,id:uid()}])}
      onEdit={d=>saveSess(sessions.map(s=>s.id===d.id?d:s))}
      onDelete={id=>saveSess(sessions.filter(s=>s.id!==id))} />,
  };

  return (
    <>
      {/* Mobile */}
      <div style={{display:'block'}} className="desktop-hidden">
        {screens[tab]}
        <nav className="bottom-nav">
          {TABS.map(({id,i,l})=>(
            <button key={id} className={`nav-btn${tab===id?' active':''}`} onClick={()=>setTab(id)}>
              <Icon n={i} size={22} color={tab===id?'var(--navy-800)':'var(--ink-400)'} />
              {l}
            </button>
          ))}
        </nav>
      </div>

      {/* Desktop */}
      <div className="desktop-shell" style={{display:'none'}}>
        <Sidebar tab={tab} onTab={setTab} count={students.length} />
        <main style={{overflowY:'auto',minWidth:0,background:'var(--surface-app)'}}>
          {screens[tab]}
        </main>
      </div>

      <style>{`
        @media(min-width:768px){
          .desktop-hidden{display:none!important}
          .desktop-shell{display:grid!important}
        }
      `}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
